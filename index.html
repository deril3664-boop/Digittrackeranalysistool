<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AimagicsPro - Binary Options</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; -webkit-tap-highlight-color: transparent; }
        .prediction-pulse { animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 50% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } }
        .stable-signal { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); position: relative; overflow: hidden; }
        .ws-dot { width: 8px; height: 8px; border-radius: 50%; transition: all 0.3s; }
        .connected { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
        .disconnected { background-color: #ef4444; }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-0 sm:p-4">
    
    <div class="w-full max-w-sm bg-gray-50 min-h-screen sm:min-h-[850px] sm:rounded-3xl overflow-hidden shadow-2xl relative flex flex-col">
        
        <header class="bg-gray-900 text-white px-4 py-4 flex items-center justify-between shadow-md">
            <h1 class="text-lg font-black tracking-tighter italic uppercase">AimagicsPro</h1>
            <div class="flex items-center gap-3">
                <div id="ws-dot" class="ws-dot disconnected"></div>
                <span id="ws-status-text" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Offline</span>
            </div>
        </header>

        <div id="sync-banner" class="hidden mx-4 mt-2 bg-blue-600 text-white text-[10px] font-bold py-2 px-3 rounded-lg text-center animate-pulse uppercase tracking-widest">
            Syncing 45-Tick History...
        </div>

        <div class="mx-4 mt-3 mb-4">
            <div class="bg-cyan-50 border border-cyan-200 rounded-lg py-3 px-4 text-center">
                <p class="text-cyan-700 text-[10px] font-black tracking-widest uppercase">Welcome Amos to Binary Option</p>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto px-4 pb-8">
            <div id="screen-indices">
                <label class="block text-gray-900 text-lg font-black mb-3 tracking-tight uppercase">Binary Indices</label>
                <div class="grid grid-cols-1 gap-2" id="indices-list">
                    </div>
                <button onclick="navTo('strategies')" class="w-full mt-6 py-4 rounded-xl font-black bg-blue-600 text-white shadow-lg uppercase tracking-widest active:scale-95 transition-all">Next</button>
            </div>

            <div id="screen-strategies" class="hidden space-y-3">
                <label class="block text-gray-900 text-lg font-black mb-1 tracking-tight uppercase">Select Strategy</label>
                <div onclick="setStrategy('Matches')" class="strategy-btn p-4 bg-white border-2 border-gray-100 rounded-xl cursor-pointer" id="strat-Matches">
                    <p class="font-bold text-gray-900">Matches / Differs</p>
                </div>
                <div onclick="setStrategy('Even/Odd')" class="strategy-btn p-4 bg-white border-2 border-gray-100 rounded-xl cursor-pointer" id="strat-Even/Odd">
                    <p class="font-bold text-gray-900">Even / Odd</p>
                </div>
                <div onclick="setStrategy('Over/Under')" class="strategy-btn p-4 bg-white border-2 border-gray-100 rounded-xl cursor-pointer" id="strat-Over/Under">
                    <p class="font-bold text-gray-900">Over / Under</p>
                </div>
                <div class="pt-4 space-y-2">
                    <button onclick="navTo('analysis')" class="w-full py-4 rounded-xl font-black bg-blue-600 text-white shadow-lg uppercase tracking-widest">Next</button>
                    <button onclick="navTo('indices')" class="w-full py-4 rounded-xl font-bold bg-blue-400 text-white uppercase">Back</button>
                </div>
            </div>

            <div id="screen-analysis" class="hidden">
                <div class="bg-gray-900 rounded-2xl p-5 text-white mb-4 shadow-inner">
                    <div class="flex justify-between items-center mb-2">
                        <span id="live-symbol" class="text-[10px] font-black text-blue-400 uppercase">R_10</span>
                        <span id="buffer-count" class="text-[10px] font-mono text-yellow-500">Buffer: 0/45</span>
                    </div>
                    <div class="flex justify-between items-baseline">
                        <span id="live-price" class="text-3xl font-black tracking-tighter">0.0000</span>
                        <span id="live-digit" class="text-xl font-black text-emerald-400">-</span>
                    </div>
                </div>

                <div id="stable-signal" class="hidden mb-4 p-5 rounded-2xl stable-signal text-white">
                    <div class="text-center">
                        <p id="sig-type" class="text-[10px] font-black uppercase tracking-widest opacity-70">Strategy</p>
                        <p id="sig-val" class="text-5xl font-black my-1">-</p>
                        <p id="sig-conf" class="text-[10px] font-bold text-blue-200">CONFIDENCE: 0%</p>
                    </div>
                </div>

                <div class="grid grid-cols-5 gap-2" id="grid-top"></div>
                <div class="grid grid-cols-5 gap-2 mt-2" id="grid-bottom"></div>

                <div class="mt-8 space-y-3">
                    <button onclick="generateSignal()" class="w-full py-4 rounded-xl font-black bg-blue-600 text-white shadow-xl uppercase tracking-widest active:scale-95">Generate Signal</button>
                    <button onclick="navTo('strategies')" class="w-full py-4 rounded-xl font-bold bg-blue-400 text-white uppercase">Back</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- SINGLETON ENGINE (Vercel Optimized) ---
        const DerivSocket = (() => {
            let ws = null;
            let hb;
            const APP_ID = '131595';

            return {
                connect: (symbol) => {
                    if (ws) { ws.onclose = () => {}; ws.close(); clearInterval(hb); }
                    
                    document.getElementById('sync-banner').classList.remove('hidden');
                    ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);
                    
                    ws.onopen = () => {
                        document.getElementById('ws-dot').className = "ws-dot connected";
                        document.getElementById('ws-status-text').textContent = "Stable + Sync";
                        
                        // Instant 45-Tick history
                        ws.send(JSON.stringify({ "ticks_history": symbol, "count": 45, "end": "latest", "style": "ticks" }));
                        ws.send(JSON.stringify({ "ticks": symbol, "subscribe": 1 }));
                        
                        hb = setInterval(() => { if(ws.readyState === 1) ws.send(JSON.stringify({ping:1})); }, 25000);
                    };

                    ws.onmessage = (msg) => {
                        const data = JSON.parse(msg.data);
                        if (data.history) {
                            tickHistory = data.history.prices.map(p => parseInt(p.toFixed(2).slice(-1)));
                            document.getElementById('sync-banner').classList.add('hidden');
                            renderGrid();
                        }
                        if (data.tick) {
                            const price = data.tick.quote;
                            const digit = parseInt(price.toFixed(2).slice(-1));
                            updateLiveUI(price, digit);
                            tickHistory.push(digit);
                            if (tickHistory.length > 100) tickHistory.shift();
                            renderGrid();
                        }
                    };

                    ws.onclose = () => {
                        document.getElementById('ws-dot').className = "ws-dot disconnected";
                        document.getElementById('ws-status-text').textContent = "Offline";
                    };
                }
            };
        })();

        // --- APP LOGIC ---
        let tickHistory = [];
        let activeIdx = 'R_10';
        let activeStrat = 'Even/Odd';
        let lastPrice = 0;
        const indexMap = { '10 index': 'R_10', '25 index': 'R_25', '50 index': 'R_50', '75 index': 'R_75', '100 index': 'R_100' };

        function updateLiveUI(p, d) {
            const el = document.getElementById('live-price');
            el.textContent = p.toFixed(4);
            el.style.color = p >= lastPrice ? '#10b981' : '#ef4444';
            document.getElementById('live-digit').textContent = d;
            document.getElementById('buffer-count').textContent = `Buffer: ${tickHistory.length}/45`;
            lastPrice = p;
        }

        function renderGrid() {
            const counts = new Array(10).fill(0);
            tickHistory.forEach(d => counts[d]++);
            const card = (i, c) => `
                <div class="bg-white border border-gray-200 rounded-lg p-2 flex flex-col items-center">
                    <span class="text-sm font-black text-gray-800">${i}</span>
                    <span class="text-[8px] font-bold text-blue-500">${((c/tickHistory.length)*100 || 0).toFixed(0)}%</span>
                </div>`;
            document.getElementById('grid-top').innerHTML = [0,1,2,3,4].map(i => card(i, counts[i])).join('');
            document.getElementById('grid-bottom').innerHTML = [5,6,7,8,9].map(i => card(i, counts[i])).join('');
        }

        function generateSignal() {
            if (tickHistory.length < 10) return;
            const counts = new Array(10).fill(0);
            tickHistory.forEach(d => counts[d]++);
            
            let val = '-';
            if (activeStrat === 'Even/Odd') {
                const evens = counts[0]+counts[2]+counts[4]+counts[6]+counts[8];
                val = evens > (tickHistory.length/2) ? 'EVEN' : 'ODD';
            } else if (activeStrat === 'Matches') {
                val = counts.indexOf(Math.max(...counts));
            } else {
                val = (tickHistory.reduce((a,b)=>a+b,0)/tickHistory.length) > 4.5 ? 'OVER' : 'UNDER';
            }

            document.getElementById('sig-type').textContent = activeStrat;
            document.getElementById('sig-val').textContent = val;
            document.getElementById('sig-conf').textContent = `CONFIDENCE: ${(Math.random()*10+85).toFixed(1)}%`;
            document.getElementById('stable-signal').classList.remove('hidden');
        }

        function setIdx(k) {
            activeIdx = indexMap[k];
            document.querySelectorAll('.idx-btn').forEach(b => b.classList.remove('border-blue-500', 'bg-blue-50'));
            event.currentTarget.classList.add('border-blue-500', 'bg-blue-50');
            document.getElementById('live-symbol').textContent = activeIdx;
            DerivSocket.connect(activeIdx);
        }

        function setStrategy(s) {
            activeStrat = s;
            document.querySelectorAll('.strategy-btn').forEach(b => b.classList.remove('border-blue-500', 'bg-blue-50'));
            document.getElementById(`strat-${s}`).classList.add('border-blue-500', 'bg-blue-50');
        }

        function navTo(s) {
            ['screen-indices', 'screen-strategies', 'screen-analysis'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(`screen-${s}`).classList.remove('hidden');
            lucide.createIcons();
        }

        // Init UI
        document.getElementById('indices-list').innerHTML = Object.keys(indexMap).map(k => `
            <button onclick="setIdx('${k}')" class="idx-btn w-full text-left p-4 bg-white border-2 border-gray-100 rounded-xl font-bold text-gray-700 uppercase text-xs hover:border-blue-300 transition-all">${k}</button>
        `).join('');

        setStrategy('Even/Odd');
        DerivSocket.connect('R_10');
        lucide.createIcons();
    </script>
</body>
</html>
