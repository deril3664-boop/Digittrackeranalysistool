<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AimagicsPro - Dominant Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100dvh;
        }
        .app-shell {
            width: 100%;
            max-width: 500px;
            min-height: 100dvh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (max-width: 640px) { .app-shell { max-width: 100%; border-radius: 0; } }
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); }
        }
        .prediction-pulse { animation: pulse-ring 1.5s infinite; }
    </style>
</head>
<body>

    <div class="app-shell">
        <header class="bg-[#0f172a] text-white px-5 py-5 flex items-center justify-between shadow-lg">
            <h1 class="text-xl font-bold tracking-tight">AimagicsPro</h1>
            <div class="flex items-center gap-2">
                <span class="text-[11px] text-gray-400 font-medium">CapCut</span>
                <i data-lucide="sparkles" class="w-5 h-5 text-blue-400"></i>
            </div>
        </header>

        <div class="px-5 mt-6">
            <div class="bg-[#f0f9ff] border border-[#bae6fd] rounded-lg py-3 px-4 text-center">
                <p class="text-[#0369a1] text-xs font-bold tracking-widest uppercase">
                    Welcome Amos to Binary Option
                </p>
            </div>
        </div>

        <main class="flex-1 px-5 pt-8 overflow-y-auto pb-10">
            <div id="screen-indices" class="space-y-6">
                <label class="block text-[#1e293b] text-2xl font-extrabold">Binary Indices</label>
                <div class="relative">
                    <button onclick="toggleDropdown('indices')" class="w-full bg-white border-2 border-[#e2e8f0] rounded-xl py-4 px-5 text-left flex items-center justify-between shadow-sm">
                        <span id="selected-index" class="text-[#334155] font-semibold">Volatility 10 Index</span>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-gray-400"></i>
                    </button>
                    <div id="indices-dropdown" class="hidden absolute left-0 right-0 mt-2 bg-white rounded-xl shadow-2xl z-50 border border-gray-100 overflow-hidden">
                        <div class="max-h-[350px] overflow-y-auto" id="indices-list"></div>
                    </div>
                </div>
                <button onclick="goToTradeType()" class="w-full py-5 rounded-xl font-black text-lg bg-[#3b82f6] text-white shadow-xl active:scale-[0.98]">Next</button>
            </div>

            <div id="screen-tradeType" class="hidden space-y-6">
                <label class="block text-[#1e293b] text-2xl font-extrabold">Trade Type</label>
                <div class="relative">
                    <button onclick="toggleDropdown('tradeType')" class="w-full bg-white border-2 border-[#e2e8f0] rounded-xl py-4 px-5 text-left flex items-center justify-between shadow-sm">
                        <span id="selected-trade" class="text-[#334155] font-semibold">Over</span>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-gray-400"></i>
                    </button>
                    <div id="tradeType-dropdown" class="hidden absolute left-0 right-0 mt-2 bg-white rounded-xl shadow-2xl z-50 border border-gray-100">
                        <div id="tradeType-list"></div>
                    </div>
                </div>
                <div class="space-y-3 pt-4">
                    <button onclick="goToAnalysis()" class="w-full py-5 rounded-xl font-black text-lg bg-[#3b82f6] text-white shadow-xl active:scale-95 transition-all">Start Terminal</button>
                    <button onclick="goToIndices()" class="w-full py-4 rounded-xl font-bold bg-[#94a3b8] text-white active:scale-95 transition-all">Back</button>
                </div>
            </div>

            <div id="screen-analysis" class="hidden space-y-8">
                <div class="grid grid-cols-5 gap-2" id="digit-grid-top"></div>
                <div class="grid grid-cols-5 gap-2" id="digit-grid-bottom"></div>

                <div id="prediction-container" class="hidden flex flex-col items-center py-4">
                    <div class="relative">
                        <div class="w-32 h-32 rounded-full border-[6px] border-blue-600 flex items-center justify-center bg-white prediction-pulse shadow-2xl">
                            <span id="final-recommendation" class="font-black text-[#1d4ed8] leading-none">-</span>
                        </div>
                        <div id="signal-badge" class="absolute -bottom-2 bg-green-600 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase">Strong</div>
                    </div>
                    <p id="confidence-text" class="text-[#3b82f6] mt-6 font-black tracking-[0.2em] text-[10px] uppercase"></p>
                </div>

                <div class="space-y-4">
                    <button onclick="processDominantSignal()" id="run-btn" class="w-full py-5 rounded-2xl font-black text-xl bg-[#3b82f6] text-white shadow-2xl active:scale-95 transition-all">GET SIGNAL</button>
                    <button onclick="goToTradeType()" class="w-full py-4 font-bold text-[#94a3b8] text-center">Back</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const APP_ID = '131595';
        let ws;
        let tickHistory = [];
        const indexMap = {
            'Volatility 10 Index': 'R_10', 'Volatility 10 (1s) Index': '1HZ10V',
            'Volatility 25 Index': 'R_25', 'Volatility 25 (1s) Index': '1HZ25V',
            'Volatility 50 Index': 'R_50', 'Volatility 50 (1s) Index': '1HZ50V',
            'Volatility 75 Index': 'R_75', 'Volatility 75 (1s) Index': '1HZ75V',
            'Volatility 100 Index': 'R_100', 'Volatility 100 (1s) Index': '1HZ100V'
        };

        function connectWS() {
            ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);
            ws.onopen = () => subscribeToTicks();
            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);
                if (data.tick) {
                    const lastDigit = parseInt(data.tick.quote.toString().slice(-1));
                    tickHistory.push(lastDigit);
                    if (tickHistory.length > 100) tickHistory.shift();
                    updateGridDisplay();
                }
            };
            ws.onclose = () => setTimeout(connectWS, 3000);
        }

        function subscribeToTicks() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const symbol = indexMap[selectedIndex] || 'R_10';
                ws.send(JSON.stringify({ forget_all: "ticks" }));
                ws.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
            }
        }

        function updateGridDisplay() {
            const counts = new Array(10).fill(0);
            tickHistory.forEach(d => counts[d]++);
            const probs = counts.map(c => tickHistory.length ? (c / tickHistory.length) * 100 : 0);

            const card = (d, p) => `<div class="bg-white rounded-xl p-3 flex flex-col items-center justify-center border-2 border-[#f1f5f9] shadow-sm"><span class="text-xl font-black text-[#1e293b]">${d}</span><span class="text-[9px] mt-1 text-blue-600 font-bold">${p.toFixed(0)}%</span></div>`;
            document.getElementById('digit-grid-top').innerHTML = [0,1,2,3,4].map(i => card(i, probs[i])).join('');
            document.getElementById('digit-grid-bottom').innerHTML = [5,6,7,8,9].map(i => card(i, probs[i])).join('');
        }

        function processDominantSignal() {
            if (tickHistory.length < 20) return;

            const counts = new Array(10).fill(0);
            tickHistory.forEach(d => counts[d]++);
            const probs = counts.map((c, i) => ({digit: i, prob: (c / tickHistory.length) * 100}));
            const sorted = [...probs].sort((a,b) => b.prob - a.prob);
            
            const recEl = document.getElementById('final-recommendation');
            const badge = document.getElementById('signal-badge');
            
            // Logic for dominant signal
            if (['Even/Odd', 'Rise/Fall'].includes(selectedTradeType)) {
                let signal = "";
                if (selectedTradeType === 'Even/Odd') {
                    const evens = probs.filter(x => x.digit % 2 === 0).reduce((a,b)=>a+b.prob, 0);
                    signal = evens > 50 ? "EVEN" : "ODD";
                } else {
                    signal = tickHistory[tickHistory.length-1] > tickHistory[tickHistory.length-2] ? "RISE" : "FALL";
                }
                recEl.textContent = signal;
                recEl.className = "font-black text-[#1d4ed8] text-2xl uppercase";
            } else {
                // Dominant digit logic
                recEl.textContent = sorted[0].digit;
                recEl.className = "font-black text-[#1d4ed8] text-7xl";
            }

            // Strength Indicator
            const isStrong = sorted[0].prob > 15;
            badge.textContent = isStrong ? "Strong Signal" : "Weak Signal";
            badge.className = `absolute -bottom-2 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase ${isStrong ? 'bg-green-600' : 'bg-amber-500'}`;

            document.getElementById('confidence-text').textContent = `Dominance: ${Math.round(sorted[0].prob)}%`;
            document.getElementById('prediction-container').classList.remove('hidden');
        }

        let selectedIndex = 'Volatility 10 Index', selectedTradeType = 'Over';
        function populate() {
            document.getElementById('indices-list').innerHTML = Object.keys(indexMap).map(i => `<button onclick="setIdx('${i}')" class="w-full text-left py-4 px-6 hover:bg-gray-50 border-b border-gray-50 text-sm font-bold text-gray-700">${i}</button>`).join('');
            document.getElementById('tradeType-list').innerHTML = ['Over','Under','Matches','Differs','Even/Odd','Rise/Fall'].map(t => `<button onclick="setTrade('${t}')" class="w-full text-left py-4 px-6 hover:bg-gray-50 border-b border-gray-100 text-sm font-bold text-gray-700">${t}</button>`).join('');
        }
        function setIdx(v) { selectedIndex = v; document.getElementById('selected-index').textContent = v; toggleDropdown('indices'); subscribeToTicks(); }
        function setTrade(v) { selectedTradeType = v; document.getElementById('selected-trade').textContent = v; toggleDropdown('tradeType'); }
        function toggleDropdown(id) { document.getElementById(`${id}-dropdown`).classList.toggle('hidden'); }
        function toggleScreen(id) { ['screen-indices','screen-tradeType','screen-analysis'].forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function goToTradeType() { toggleScreen('screen-tradeType'); }
        function goToIndices() { toggleScreen('screen-indices'); }
        function goToAnalysis() { toggleScreen('screen-analysis'); }

        populate();
        connectWS();
    </script>
</body>
    </html>
