<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digit Tracker Analysis Tool</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: #00eaff;
  text-align: center;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

.page {
  display: none;
  position: relative;
  z-index: 2;
  padding: 20px;
}

.active {
  display: block;
}

button {
  padding: 12px 20px;
  background: orange;
  border: none;
  border-radius: 6px;
  margin: 10px;
  font-weight: bold;
}

.live { color: lime; }
.fail { color: red; }

.price {
  font-size: 28px;
  color: orange;
}

select {
  padding: 10px;
  background: black;
  color: orange;
  border: 1px solid orange;
}

.circle {
  width: 100px;
  height: 100px;
  border: 4px solid orange;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: auto;
}

.freq {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.bar {
  width: 10px;
  margin: 2px;
  background: orange;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <h1>Digit Tracker Analysis Tool</h1>
  <div id="status">Not Connected</div>
  <button onclick="connect()">Connect WebSocket</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">

  <h2>Matches / Differs</h2>

  <select id="symbol">
    <option value="R_10">Vol 10</option>
    <option value="R_25">Vol 25</option>
    <option value="R_50">Vol 50</option>
    <option value="R_75">Vol 75</option>
    <option value="R_100">Vol 100</option>
    <option value="1HZ10V">1s Vol 10</option>
    <option value="1HZ25V">1s Vol 25</option>
    <option value="1HZ50V">1s Vol 50</option>
    <option value="1HZ75V">1s Vol 75</option>
    <option value="1HZ100V">1s Vol 100</option>
  </select>

  <div class="price" id="price">----</div>

  <button onclick="toggle()" id="toggleBtn">START ANALYSIS</button>

  <div class="circle" id="score">0</div>

  <div style="display:flex; justify-content:center; gap:30px;">
    <div>
      <div class="circle" id="match">0%</div>
      MATCH
    </div>
    <div>
      <div class="circle" id="diff">0%</div>
      DIFFERS
    </div>
  </div>

  <h3 id="prediction"></h3>

  <div class="freq" id="chart"></div>

</div>

<script>
let ws;
let ticks = [];
let analyzing = false;
let pingInterval;

// ✅ YOUR APP ID EMBEDDED HERE
const WS_URL = "wss://ws.derivws.com/websockets/v3?app_id=131595";

// CONNECT
function connect() {
  const status = document.getElementById("status");
  status.innerText = "Connecting...";

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    status.innerText = "LIVE";
    status.className = "live";

    startPing();

    document.getElementById("page1").classList.remove("active");
    document.getElementById("page2").classList.add("active");
  };

  ws.onerror = () => {
    status.innerText = "Connection Failed";
    status.className = "fail";
  };

  ws.onclose = () => {
    status.innerText = "Reconnecting...";
    status.className = "fail";
    stopPing();
    setTimeout(connect, 3000);
  };

  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    if (data.history) {
      ticks = data.history.prices.map(p => lastDigit(p));
      update();
      subscribe();
    }

    if (data.tick) {
      let price = data.tick.quote;
      document.getElementById("price").innerText = price;

      ticks.push(lastDigit(price));
      ticks = ticks.slice(-45);

      if (analyzing) update();
    }
  };
}

// KEEP ALIVE
function startPing() {
  pingInterval = setInterval(() => {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ ping: 1 }));
    }
  }, 25000);
}

function stopPing() {
  clearInterval(pingInterval);
}

// START / STOP
function toggle() {
  if (!ws || ws.readyState !== 1) {
    alert("Connect first");
    return;
  }

  analyzing = !analyzing;
  const btn = document.getElementById("toggleBtn");

  if (analyzing) {
    btn.innerText = "STOP ANALYSIS";

    ws.send(JSON.stringify({
      ticks_history: document.getElementById("symbol").value,
      count: 45,
      end: "latest"
    }));

  } else {
    btn.innerText = "START ANALYSIS";
  }
}

// SUBSCRIBE
function subscribe() {
  ws.send(JSON.stringify({
    ticks: document.getElementById("symbol").value,
    subscribe: 1
  }));
}

// LAST DIGIT
function lastDigit(p) {
  return parseInt(p.toString().slice(-1));
}

// ANALYSIS
function update() {
  let freq = Array(10).fill(0);
  ticks.forEach(d => freq[d]++);

  let matches = 0;
  for (let i = 1; i < ticks.length; i++) {
    if (ticks[i] === ticks[i - 1]) matches++;
  }

  let matchP = (matches / ticks.length) * 100;
  let diffP = 100 - matchP;

  document.getElementById("match").innerText = matchP.toFixed(1) + "%";
  document.getElementById("diff").innerText = diffP.toFixed(1) + "%";

  let overdue = freq.filter(f => f === 0).length;
  let score = Math.min(100, (overdue * 12) + matches * 2);

  document.getElementById("score").innerText = score;

  let pred = "WAIT";
  if (overdue >= 4) pred = "DIFFERS ⚡";
  else if (matches >= 6) pred = "MATCH 🔥";

  document.getElementById("prediction").innerText = pred;

  drawChart(freq);
}

// CHART
function drawChart(freq) {
  let chart = document.getElementById("chart");
  chart.innerHTML = "";

  freq.forEach(f => {
    let bar = document.createElement("div");
    bar.className = "bar";
    bar.style.height = (f * 6) + "px";
    chart.appendChild(bar);
  });
}

// MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "0123456789";
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00eaff";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height) drops[i] = 0;
    drops[i]++;
  }
}

setInterval(drawMatrix, 80);
</script>

</body>
</html>
