<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AimagicsPro - Binary Options</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; }
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
        }
        .prediction-pulse { animation: pulse-ring 1.5s infinite; }
        .dropdown-enter { animation: dropdown-in 0.15s ease-out; }
        @keyframes dropdown-in {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-sm bg-gray-50 min-h-[800px] rounded-3xl overflow-hidden shadow-2xl relative">
        
        <header class="bg-gradient-to-r from-gray-900 via-gray-800 to-gray-900 text-white px-4 py-3 flex items-center justify-between shadow-md">
            <h1 class="text-lg font-semibold tracking-wide">AimagicsPro</h1>
            <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400 font-medium">CapCut</span>
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z"/>
                </svg>
            </div>
        </header>

        <div class="mx-4 mt-4 mb-6">
            <div class="bg-cyan-50 border border-cyan-200 rounded-lg py-2.5 px-4 text-center">
                <p class="text-cyan-700 text-sm font-semibold tracking-wide uppercase">
                    Welcome Amos to Binary Option
                </p>
            </div>
        </div>

        <div id="screen-indices" class="px-4 pb-6">
            <div class="mb-4">
                <label class="block text-gray-900 text-xl font-bold mb-3">Binary Indices</label>
                <button onclick="toggleDropdown('indices')" class="w-full bg-gray-100 border-2 border-gray-300 rounded-xl py-3.5 px-4 text-left flex items-center justify-between">
                    <span id="selected-index" class="text-gray-800 font-medium">10 index</span>
                    <i data-lucide="chevron-down" class="w-5 h-5 text-gray-500" id="indices-chevron"></i>
                </button>
                <div id="indices-dropdown" class="hidden absolute left-4 right-4 mt-1 bg-white rounded-xl shadow-xl z-50 border border-gray-200 dropdown-enter overflow-hidden">
                    <div class="max-h-80 overflow-y-auto" id="indices-list"></div>
                </div>
            </div>
            <div class="space-y-3 mt-8">
                <button onclick="goToTradeType()" class="w-full py-4 rounded-xl font-bold bg-blue-500 hover:bg-blue-600 text-white shadow-lg active:scale-95 transition-all">Next</button>
            </div>
        </div>

        <div id="screen-tradeType" class="hidden px-4 pb-6">
            <div class="mb-4">
                <label class="block text-gray-900 text-xl font-bold mb-3">Trade Type</label>
                <button onclick="toggleDropdown('tradeType')" class="w-full bg-gray-100 border-2 border-gray-300 rounded-xl py-3.5 px-4 text-left flex items-center justify-between">
                    <span id="selected-trade" class="text-gray-800 font-medium">Over</span>
                    <i data-lucide="chevron-down" class="w-5 h-5 text-gray-500" id="tradeType-chevron"></i>
                </button>
                <div id="tradeType-dropdown" class="hidden absolute left-4 right-4 mt-1 bg-white rounded-xl shadow-xl z-50 border border-gray-200 dropdown-enter">
                    <div id="tradeType-list"></div>
                </div>
            </div>
            <div class="space-y-3 mt-8">
                <button onclick="goToAnalysis()" class="w-full py-4 rounded-xl font-bold bg-blue-500 text-white shadow-lg active:scale-95 transition-all">Next</button>
                <button onclick="goToIndices()" class="w-full py-4 rounded-xl font-bold bg-gray-400 text-white active:scale-95 transition-all">Back</button>
            </div>
        </div>

        <div id="screen-analysis" class="hidden">
            <div class="px-4 mt-2">
                <div class="grid grid-cols-5 gap-2" id="digit-grid-top"></div>
                <div class="grid grid-cols-5 gap-2 mt-2" id="digit-grid-bottom"></div>
            </div>

            <div id="prediction-container" class="hidden mt-8 flex flex-col items-center">
                <div class="w-24 h-24 rounded-full border-4 border-blue-500 flex items-center justify-center bg-white prediction-pulse shadow-lg">
                    <span id="final-recommendation" class="font-bold text-blue-700 tracking-tight">-</span>
                </div>
                <p id="confidence-text" class="text-[10px] text-blue-500 mt-3 font-bold uppercase tracking-widest"></p>
            </div>

            <div class="px-4 mt-10 space-y-3">
                <button onclick="startAnalysis()" id="run-btn" class="w-full py-4 rounded-xl font-bold bg-blue-500 text-white shadow-lg active:scale-95 transition-all">Run Analysis</button>
                <button onclick="goToTradeType()" class="w-full py-4 rounded-xl font-bold bg-gray-400 text-white active:scale-95 transition-all">Back</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- INSTANT TRADING ENGINE ---
        const TradingEngine = (function() {
            let instance;
            return {
                getInstance: function() {
                    if (!instance) {
                        instance = {
                            analyze: function(tradeType) {
                                // Instant 50-tick buffer simulation for immediate display
                                const buffer = Array.from({length: 50}, () => Math.floor(Math.random() * 10));
                                const counts = new Array(10).fill(0);
                                buffer.forEach(d => counts[d]++);
                                const probs = counts.map(c => (c / buffer.length) * 100);
                                const sorted = [...probs].sort((a,b)=>b-a);

                                let resultText = "";
                                const isNumeric = ['Over','Under','Matches','Differs'].includes(tradeType);

                                if (isNumeric) {
                                    // FIGURE OUTPUT
                                    resultText = buffer[buffer.length - 1].toString();
                                } else {
                                    // WORD OUTPUT
                                    if (tradeType === 'Even/Odd') resultText = Math.random() > 0.5 ? "EVEN" : "ODD";
                                    else resultText = Math.random() > 0.5 ? "RISE" : "FALL";
                                }

                                return { rec: resultText, conf: Math.round(sorted[0]), probs: probs, isNum: isNumeric };
                            }
                        };
                    }
                    return instance;
                }
            };
        })();

        // --- DATA & UI LOGIC ---
        const indices = ['10','10 (1s)','25','25 (1s)','50','50 (1s)','75','75 (1s)','100','100 (1s)'].map(v => v + ' index');
        const trades = ['Over','Under','Matches','Differs','Even/Odd','Rise/Fall'];
        let selectedIndex = '10 index', selectedTradeType = 'Over';

        function populate() {
            document.getElementById('indices-list').innerHTML = indices.map(i => `<button onclick="setIdx('${i}')" class="w-full text-left py-4 px-4 hover:bg-gray-50 border-b border-gray-100 text-sm font-medium text-gray-700">${i}</button>`).join('');
            document.getElementById('tradeType-list').innerHTML = trades.map(t => `<button onclick="setTrade('${t}')" class="w-full text-left py-4 px-4 hover:bg-gray-50 border-b border-gray-100 text-sm font-medium text-gray-700">${t}</button>`).join('');
        }

        function setIdx(v) { selectedIndex = v; document.getElementById('selected-index').textContent = v; toggleDropdown('indices'); }
        function setTrade(v) { selectedTradeType = v; document.getElementById('selected-trade').textContent = v; toggleDropdown('tradeType'); }
        function toggleDropdown(id) { document.getElementById(`${id}-dropdown`).classList.toggle('hidden'); }

        function toggleScreen(id) {
            ['screen-indices','screen-tradeType','screen-analysis'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function goToTradeType() { toggleScreen('screen-tradeType'); }
        function goToIndices() { toggleScreen('screen-indices'); }
        function goToAnalysis() { toggleScreen('screen-analysis'); initDigitGrid(); }

        function initDigitGrid(probs = new Array(10).fill(0)) {
            const card = (d, p) => `<div class="bg-white rounded-xl p-3 flex flex-col items-center justify-center border-2 border-gray-200 shadow-sm"><span class="text-xl font-bold text-gray-800">${d}</span><span class="text-[10px] mt-1 text-blue-500 font-bold">${p.toFixed(1)}%</span></div>`;
            document.getElementById('digit-grid-top').innerHTML = [0,1,2,3,4].map(i => card(i, probs[i])).join('');
            document.getElementById('digit-grid-bottom').innerHTML = [5,6,7,8,9].map(i => card(i, probs[i])).join('');
        }

        function startAnalysis() {
            const res = TradingEngine.getInstance().analyze(selectedTradeType);
            initDigitGrid(res.probs);
            
            const recEl = document.getElementById('final-recommendation');
            recEl.textContent = res.rec;
            
            // UI Formatting: Words (text-xl) vs Figures (text-5xl)
            recEl.className = `font-black text-blue-700 leading-none ${res.isNum ? 'text-5xl' : 'text-xl'}`;
            
            document.getElementById('confidence-text').textContent = `Dominance: ${res.conf}%`;
            document.getElementById('prediction-container').classList.remove('hidden');
        }

        populate();
    </script>
</body>
</html>
