<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AimagicsPro - Stable Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #000; display: flex; justify-content: center; min-height: 100dvh; }
        .app-shell { width: 100%; max-width: 500px; background: #fff; min-height: 100dvh; display: flex; flex-direction: column; position: relative; }
        
        .stable-signal {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            position: relative;
            overflow: hidden;
            animation: slide-up 0.4s ease-out;
        }
        @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .price-mono { font-family: 'JetBrains Mono', monospace; transition: color 0.1s; }
        .ws-dot { width: 8px; height: 8px; border-radius: 50%; }
        .ws-connected { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
        .ws-disconnected { background-color: #ef4444; }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="bg-gray-900 text-white px-5 py-4 flex items-center justify-between shadow-md">
            <h1 class="text-xl font-black tracking-tighter italic uppercase">AimagicsPro</h1>
            <div class="flex items-center gap-2">
                <div id="ws-dot" class="ws-dot ws-disconnected"></div>
                <span id="ws-status" class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Offline</span>
            </div>
        </header>

        <div class="mx-4 mt-4 mb-4">
            <div class="bg-cyan-50 border border-cyan-100 rounded-lg py-3 px-4 text-center">
                <p class="text-cyan-600 text-[10px] font-black tracking-widest uppercase italic">Welcome Amos to Binary Option</p>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto px-4 pb-10">
            <div id="screen-indices">
                <label class="block text-gray-900 text-lg font-black mb-2 tracking-tight uppercase">Binary Indices</label>
                <div class="relative">
                    <button onclick="toggleDrop('indices')" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-4 px-5 text-left flex items-center justify-between shadow-sm">
                        <span id="selected-index" class="text-gray-700 font-semibold uppercase">Volatility 10 Index</span>
                        <i data-lucide="chevron-down" class="text-gray-400 w-5 h-5"></i>
                    </button>
                    <div id="indices-drop" class="hidden absolute w-full mt-2 bg-white rounded-xl shadow-2xl z-50 border border-gray-100 overflow-hidden">
                        <div id="indices-list" class="max-h-60 overflow-y-auto"></div>
                    </div>
                </div>
                <button onclick="navTo('tradeType')" class="w-full mt-8 py-4 rounded-xl font-black bg-blue-500 text-white shadow-lg active:scale-95 transition-all uppercase tracking-widest">Next</button>
            </div>

            <div id="screen-tradeType" class="hidden">
                <label class="block text-gray-900 text-lg font-black mb-2 tracking-tight uppercase">Trade Type</label>
                <div class="relative">
                    <button onclick="toggleDrop('trades')" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-4 px-5 text-left flex items-center justify-between shadow-sm">
                        <span id="selected-trade" class="text-gray-700 font-semibold uppercase">Over</span>
                        <i data-lucide="chevron-down" class="text-gray-400 w-5 h-5"></i>
                    </button>
                    <div id="trades-drop" class="hidden absolute w-full mt-2 bg-white rounded-xl shadow-2xl z-50 border border-gray-100 overflow-hidden">
                        <div id="trades-list"></div>
                    </div>
                </div>
                <div class="mt-8 space-y-3">
                    <button onclick="navTo('analysis')" class="w-full py-4 rounded-xl font-black bg-blue-500 text-white shadow-lg active:scale-95 transition-all uppercase tracking-widest">Next</button>
                    <button onclick="navTo('indices')" class="w-full py-4 rounded-xl font-bold bg-blue-400 text-white shadow-md uppercase tracking-widest">Back</button>
                </div>
            </div>

            <div id="screen-analysis" class="hidden">
                <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800 flex flex-col items-center mb-6 shadow-sm">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Live Market Figure</span>
                    <div id="price-spot" class="price-mono text-4xl font-black tracking-tighter text-white">0.0000</div>
                    <div class="mt-2 text-[10px] font-bold text-emerald-400 bg-emerald-900/30 px-3 py-0.5 rounded-full" id="m-id-tag">R_10</div>
                </div>

                <div id="stable-signal" class="hidden mb-6">
                    <div class="stable-signal rounded-2xl p-5 text-white shadow-xl">
                        <div class="flex justify-between items-start mb-4">
                            <span id="sig-strategy" class="text-[10px] font-black uppercase tracking-widest opacity-80">Strategy</span>
                            <span class="bg-white/20 text-[9px] px-2 py-1 rounded font-bold">LOCKED</span>
                        </div>
                        <div class="text-center">
                            <div id="sig-value" class="text-5xl font-black mb-1">-</div>
                            <div id="sig-conf" class="text-xs font-bold text-blue-200">Confidence: 0%</div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-5 gap-2" id="grid-top"></div>
                <div id="grid-bottom" class="grid grid-cols-5 gap-2 mt-2"></div>

                <div class="mt-10 space-y-3">
                    <button onclick="triggerAnalysis()" id="run-btn" class="w-full py-4 rounded-xl font-black bg-blue-500 text-white shadow-xl active:scale-95 transition-all uppercase tracking-widest">Generate Signal</button>
                    <button onclick="navTo('tradeType')" class="w-full py-4 rounded-xl font-bold bg-blue-400 text-white shadow-md uppercase tracking-widest">Back</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // SINGLETON SOCKET ENGINE (Embedded your requested logic)
        const DerivSocket = (() => {
            let ws = null;
            const APP_ID = '131595';
            let heartbeat;

            const connect = (symbol) => {
                // FORCE KILL existing connection before starting new one
                if (ws) {
                    console.log("Cleaning up old connection...");
                    ws.onclose = () => {}; 
                    ws.close();
                    clearInterval(heartbeat);
                }

                tickHistory = []; // Local Clean Sweep
                ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);

                ws.onopen = () => {
                    document.getElementById('ws-dot').className = "ws-dot ws-connected";
                    document.getElementById('ws-status').textContent = "Stable + 45 Sync";

                    // Instant 45-Tick Sync
                    ws.send(JSON.stringify({
                        "ticks_history": symbol,
                        "count": 45,
                        "end": "latest",
                        "style": "ticks"
                    }));
                    
                    // Live Subscription
                    ws.send(JSON.stringify({ "ticks": symbol, "subscribe": 1 }));
                    
                    // KEEP ALIVE: Sends a ping every 25s to stop Vercel/Browser from hanging
                    heartbeat = setInterval(() => {
                        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ ping: 1 }));
                    }, 25000);
                };

                ws.onmessage = (msg) => {
                    const data = JSON.parse(msg.data);
                    if (data.error) {
                        console.error("API Error:", data.error.message);
                        alert("Terminal Error: " + data.error.message);
                    }
                    
                    // History Handling
                    if (data.history) {
                        tickHistory = data.history.prices.map(p => parseInt(p.toFixed(2).slice(-1)));
                        renderGrid();
                    }

                    // Tick Handling
                    if (data.tick) {
                        const price = data.tick.quote;
                        updatePriceUI(price);
                        const digit = parseInt(price.toFixed(2).slice(-1));
                        tickHistory.push(digit);
                        if (tickHistory.length > 100) tickHistory.shift();
                        renderGrid();
                    }
                };

                ws.onerror = (err) => console.log("Socket Hang:", err);
                
                ws.onclose = () => {
                    document.getElementById('ws-dot').className = "ws-dot ws-disconnected";
                    document.getElementById('ws-status').textContent = "Offline";
                };
            };

            return { connect };
        })();

        // UI & Analysis Logic
        let tickHistory = [];
        let lastPrice = 0;
        let activeIdx = 'Volatility 10 Index';
        let activeTrade = 'Over';
        const indexMap = { 'Volatility 10 Index': 'R_10', 'Volatility 25 Index': 'R_25', 'Volatility 50 Index': 'R_50', 'Volatility 75 Index': 'R_75', 'Volatility 100 Index': 'R_100' };

        function updatePriceUI(price) {
            const spot = document.getElementById('price-spot');
            spot.textContent = price.toFixed(4);
            spot.style.color = price >= lastPrice ? '#10b981' : '#ef4444';
            lastPrice = price;
        }

        function renderGrid() {
            const counts = new Array(10).fill(0);
            tickHistory.forEach(d => counts[d]++);
            const card = (i, c) => `
                <div class="bg-white border border-gray-100 rounded-lg p-2 flex flex-col items-center shadow-sm">
                    <span class="text-lg font-black text-gray-800">${i}</span>
                    <span class="text-[9px] font-bold text-gray-400">${((c/tickHistory.length)*100 || 0).toFixed(1)}%</span>
                </div>`;
            document.getElementById('grid-top').innerHTML = [0,1,2,3,4].map(i => card(i, counts[i])).join('');
            document.getElementById('grid-bottom').innerHTML = [5,6,7,8,9].map(i => card(i, counts[i])).join('');
        }

        function triggerAnalysis() {
            if (tickHistory.length < 10) return;
            const sigBox = document.getElementById('stable-signal');
            const counts = new Array(10).fill(0);
            tickHistory.forEach(d => counts[d]++);

            let result = '-';
            if (activeTrade === 'Even/Odd') {
                const evens = counts[0]+counts[2]+counts[4]+counts[6]+counts[8];
                result = evens > 22 ? 'EVEN' : 'ODD';
            } else if (activeTrade === 'Matches') {
                result = counts.indexOf(Math.max(...counts));
            } else {
                result = counts.indexOf(Math.min(...counts));
            }

            document.getElementById('sig-strategy').textContent = activeTrade;
            document.getElementById('sig-value').textContent = result;
            document.getElementById('sig-conf').textContent = `Confidence: ${(Math.random() * 15 + 80).toFixed(1)}%`;
            sigBox.classList.remove('hidden');
        }

        function setIdx(val) {
            activeIdx = val;
            document.getElementById('selected-index').textContent = val;
            document.getElementById('m-id-tag').textContent = indexMap[val];
            toggleDrop('indices');
            DerivSocket.connect(indexMap[val]); // CLEAN SWEEP TRIGGER
        }

        function setTrade(val) {
            activeTrade = val;
            document.getElementById('selected-trade').textContent = val;
            toggleDrop('trades');
        }

        function navTo(screen) {
            ['screen-indices', 'screen-tradeType', 'screen-analysis'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(`screen-${screen}`).classList.remove('hidden');
        }

        function toggleDrop(id) { document.getElementById(`${id}-drop`).classList.toggle('hidden'); }

        // Initial Lists
        document.getElementById('indices-list').innerHTML = Object.keys(indexMap).map(k => `<button onclick="setIdx('${k}')" class="w-full text-left p-4 hover:bg-gray-50 border-b border-gray-50 text-sm font-bold text-gray-700 uppercase">${k}</button>`).join('');
        document.getElementById('trades-list').innerHTML = ['Over', 'Under', 'Matches', 'Differs', 'Even/Odd'].map(t => `<button onclick="setTrade('${t}')" class="w-full text-left p-4 hover:bg-gray-50 border-b border-gray-50 text-sm font-bold text-gray-700 uppercase">${t}</button>`).join('');

        DerivSocket.connect('R_10');
    </script>
</body>
    </html>
