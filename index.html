<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AimagicsPro - Success Connection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        html, body { font-family: 'Inter', sans-serif; background: #000; color: white; width: 100%; height: 100%; overflow: hidden; margin: 0; }
        #app { width: 100%; height: 100%; display: flex; flex-direction: column; background: #0a0a0a; }
        .screen { display: none; flex: 1; flex-direction: column; padding: 20px; overflow-y: auto; }
        .screen.active { display: flex; }
        .neon-text { text-shadow: 0 0 10px #00d4ff; color: #00d4ff; }
        .custom-select { background: #1a1a1a; border: 2px solid #333; border-radius: 12px; padding: 15px; width: 100%; color: white; outline: none; }
        .strategy-btn { background: #111; border: 2px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .strategy-btn.active { border-color: #00d4ff; background: #002b36; }
        .digit-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .digit-card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px; text-align: center; transition: 0.2s; }
        .digit-card.active { border-color: #00d4ff; background: #00d4ff22; transform: scale(1.1); box-shadow: 0 0 10px #00d4ff; }
        .ws-status { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4444; }
        .dot.connected { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .btn-main { background: #00d4ff; color: #000; font-weight: 900; padding: 18px; border-radius: 14px; width: 100%; text-transform: uppercase; }
        #sync-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div id="app">
    <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900">
        <h1 class="font-black tracking-tighter neon-text">AIMAGICS PRO</h1>
        <div class="ws-status">
            <div id="ws-dot" class="dot"></div>
            <span id="ws-state">Offline</span>
        </div>
    </header>

    <div id="sync-overlay">
        <div class="text-center">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-cyan-400 mx-auto mb-4"></div>
            <p class="text-cyan-400 font-bold">Establishing Strong Connection...</p>
        </div>
    </div>

    <div id="screen-1" class="screen active">
        <h2 class="text-xl font-bold mb-4">Select Index</h2>
        <select id="market-select" class="custom-select mb-6">
            <option value="R_10">Volatility 10 Index</option>
            <option value="R_100">Volatility 100 Index</option>
            <option value="1HZ10V">Volatility 10 (1s)</option>
            <option value="1HZ100V">Volatility 100 (1s)</option>
        </select>
        <button onclick="nav(2)" class="btn-main mt-auto">Continue</button>
    </div>

    <div id="screen-2" class="screen">
        <h2 class="text-xl font-bold mb-4">Select Strategy</h2>
        <div class="strategy-btn active" id="s-matches" onclick="setStrat('matches')">Matches / Differs</div>
        <div class="strategy-btn" id="s-even" onclick="setStrat('even')">Even / Odd</div>
        <div class="strategy-btn" id="s-over" onclick="setStrat('over')">Over / Under</div>
        <button onclick="nav(3)" class="btn-main mt-auto">Start Analysis</button>
    </div>

    <div id="screen-3" class="screen">
        <div class="bg-gray-900 p-6 rounded-2xl border border-cyan-500/30 text-center mb-4">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Market Probability</p>
            <div id="signal-display" class="text-3xl font-black">ANALYZING...</div>
        </div>
        
        <div class="digit-grid" id="digit-display">
            </div>

        <button onclick="nav(1)" class="text-gray-600 text-xs text-center mt-auto">Disconnect & Exit</button>
    </div>
</div>

<script>
    let ws = null;
    let ticks = [];
    let currentStrat = 'matches';
    let heartbeat = null;

    function nav(s) {
        document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
        document.getElementById(`screen-${s}`).classList.add('active');
        if (s === 3) startEngine();
    }

    function setStrat(s) {
        currentStrat = s;
        document.querySelectorAll('.strategy-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`s-${s}`).classList.add('active');
    }

    function startEngine() {
        if (ws) ws.close();
        const symbol = document.getElementById('market-select').value;
        const overlay = document.getElementById('sync-overlay');
        
        overlay.style.display = 'flex';
        
        // Connecting with App ID 131595
        ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=131595');

        ws.onopen = () => {
            document.getElementById('ws-dot').classList.add('connected');
            document.getElementById('ws-state').innerText = 'Online';
            
            // Sync 50 ticks history + subscribe live
            ws.send(JSON.stringify({ "ticks_history": symbol, "count": 50, "end": "latest", "style": "ticks" }));
            ws.send(JSON.stringify({ "ticks": symbol, "subscribe": 1 }));

            // Vercel Heartbeat (20s)
            if(heartbeat) clearInterval(heartbeat);
            heartbeat = setInterval(() => ws.send(JSON.stringify({ping: 1})), 20000);
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);
            if (data.msg_type === 'history') {
                overlay.style.display = 'none';
                ticks = data.history.prices;
                processData();
            }
            if (data.tick) {
                ticks.push(data.tick.quote);
                if (ticks.length > 50) ticks.shift();
                processData();
            }
        };

        ws.onclose = () => {
            document.getElementById('ws-dot').classList.remove('connected');
            document.getElementById('ws-state').innerText = 'Offline';
        };
    }

    function processData() {
        if (ticks.length === 0) return;
        const lastPrice = ticks[ticks.length - 1].toString();
        const lastDigit = lastPrice.slice(-1);
        
        // Update Digit Grid
        const grid = document.getElementById('digit-display');
        grid.innerHTML = '';
        for (let i = 0; i <= 9; i++) {
            const active = (i == lastDigit) ? 'active' : '';
            grid.innerHTML += `<div class="digit-card ${active}">${i}</div>`;
        }

        // Strategy Logic
        const signal = document.getElementById('signal-display');
        let evens = ticks.filter(t => t.toString().slice(-1) % 2 === 0).length;
        let evenProb = Math.round((evens / ticks.length) * 100);

        if (evenProb > 60) {
            signal.innerText = "BUY EVEN";
            signal.style.color = "#00ff88";
        } else if (evenProb < 40) {
            signal.innerText = "BUY ODD";
            signal.style.color = "#ff4444";
        } else {
            signal.innerText = "NEUTRAL";
            signal.style.color = "#ffffff";
        }
    }
</script>

</body>
</html>
