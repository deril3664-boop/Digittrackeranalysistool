<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DigitFlowPro Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&display=swap');
        
        body {
            background-color: #000;
            color: #FF8C00;
            font-family: 'Source Code Pro', monospace;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Matrix Background Effect */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        .terminal-glow {
            text-shadow: 0 0 10px #FF8C00;
        }

        .neon-border {
            border: 1px solid #FF8C00;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.2);
        }

        .btn-glow:active {
            background: #FF8C00;
            color: #000;
            box-shadow: 0 0 20px #FF8C00;
        }

        /* View Management */
        .view { display: none; height: 100vh; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .view.active { display: flex; }

        /* Digit Animation */
        .bar { transition: height 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        select {
            background: #000;
            border: 1px solid #FF8C00;
            color: #FF8C00;
            padding: 10px;
            width: 80%;
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div id="view-login" class="view active">
        <img src="https://deriv.com/static/87f6e3c5-9273-40e1-8f83-e0ee444f3c2e.svg" width="120" class="mb-8">
        <h1 class="text-xl mb-10 terminal-glow">DOLLAR HEIR TERMINAL</h1>
        <button onclick="loginWithDeriv()" class="btn-glow border-2 border-[#FF8C00] px-8 py-4 rounded-lg font-bold">
            CONNECT TO WEBSOCKET
        </button>
        <p id="conn-status" class="mt-4 text-xs opacity-50 text-red-500">WebSocket Disconnected</p>
    </div>

    <div id="view-market" class="view">
        <div class="w-full flex justify-between items-center mb-8">
            <span onclick="showView('view-login')" class="cursor-pointer">← BACK</span>
            <span class="font-bold">DigitFlowPro</span>
            <span class="text-green-500 text-xs">● LIVE</span>
        </div>
        
        <h2 class="mb-4">SELECT MARKET</h2>
        <select id="market-select" class="mb-8">
            <option value="R_10">Volatility 10 Index</option>
            <option value="1Z10">Volatility 10 (1s) Index</option>
            <option value="R_25">Volatility 25 Index</option>
            <option value="1Z25">Volatility 25 (1s) Index</option>
            <option value="R_50">Volatility 50 Index</option>
            <option value="1Z50">Volatility 50 (1s) Index</option>
            <option value="R_75">Volatility 75 Index</option>
            <option value="1Z75">Volatility 75 (1s) Index</option>
            <option value="R_100">Volatility 100 Index</option>
            <option value="1Z100">Volatility 100 (1s) Index</option>
        </select>

        <button onclick="startAnalysis()" class="w-full bg-[#FF8C00] text-black py-4 rounded font-bold">
            START ANALYSIS
        </button>
    </div>

    <div id="view-analysis" class="view">
        <div class="w-full flex justify-between items-center mb-4">
            <span onclick="stopAnalysis()" class="cursor-pointer text-red-500">STOP ANALYSIS</span>
            <span class="text-green-500 text-xs">● ANALYZING</span>
        </div>

        <div id="display-market-name" class="text-sm opacity-70">Volatility 10 (1s)</div>
        <div id="live-price" class="text-4xl font-bold terminal-glow my-2">0.000</div>

        <div class="relative w-32 h-32 border-4 border-[#FF8C00] rounded-full flex items-center justify-center my-6 shadow-[0_0_20px_rgba(255,140,0,0.4)]">
            <span id="last-digit" class="text-5xl font-bold">0</span>
        </div>

        <div class="flex gap-10 mb-6">
            <div class="flex flex-col items-center">
                <div class="w-16 h-16 border-2 border-[#FF8C00] rounded-full flex items-center justify-center">
                    <span id="match-count">0</span>
                </div>
                <span class="text-[10px] mt-2">MATCH</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="w-16 h-16 border-2 border-red-500 rounded-full flex items-center justify-center text-red-500">
                    <span id="differ-count">0</span>
                </div>
                <span class="text-[10px] mt-2 text-red-500">DIFFERS</span>
            </div>
        </div>

        <div class="w-full neon-border p-4 bg-black/50 rounded">
            <p class="text-[9px] mb-4 text-left">DIGIT FREQUENCY (100 TICKS)</p>
            <div class="flex justify-between items-end h-24" id="chart-bars">
                </div>
        </div>
    </div>

    <script>
        const APP_ID = "131595";
        let ws;
        let tickHistory = [];
        let currentMarket = "";

        // --- MATRIX BACKGROUND LOGIC ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const characters = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 10;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#003300";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- NAVIGATION & AUTH ---
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function loginWithDeriv() {
            window.location.href = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=en&brand=deriv`;
        }

        // --- WEBSOCKET LOGIC ---
        function initConnection() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token1') || localStorage.getItem('deriv_token');

            if (token) {
                localStorage.setItem('deriv_token', token);
                ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);
                
                ws.onopen = () => {
                    ws.send(JSON.stringify({ authorize: token }));
                    document.getElementById('conn-status').innerText = "SYSTEM CONNECTED";
                    document.getElementById('conn-status').className = "mt-4 text-xs text-green-500";
                    // Clean URL
                    window.history.replaceState({}, document.title, "/");
                    showView('view-market');
                };

                ws.onmessage = (msg) => {
                    const data = JSON.parse(msg.data);
                    if (data.msg_type === 'tick') handleTick(data.tick);
                    if (data.msg_type === 'history') handleHistory(data.history);
                };
            }
        }

        function startAnalysis() {
            currentMarket = document.getElementById('market-select').value;
            const marketName = document.getElementById('market-select').options[document.getElementById('market-select').selectedIndex].text;
            document.getElementById('display-market-name').innerText = marketName;
            
            ws.send(JSON.stringify({ 
                ticks_history: currentMarket, 
                subscribe: 1, 
                count: 100, 
                style: "ticks" 
            }));
            
            showView('view-analysis');
        }

        function stopAnalysis() {
            ws.send(JSON.stringify({ forget_all: "ticks" }));
            tickHistory = [];
            showView('view-market');
        }

        function handleHistory(history) {
            tickHistory = history.prices.map(p => p.toString().slice(-1));
            updateUI();
        }

        function handleTick(tick) {
            document.getElementById('live-price').innerText = tick.quote.toFixed(3);
            const digit = tick.quote.toString().slice(-1);
            document.getElementById('last-digit').innerText = digit;
            
            tickHistory.push(digit);
            if (tickHistory.length > 100) tickHistory.shift();
            updateUI();
        }

        function updateUI() {
            const counts = new Array(10).fill(0);
            tickHistory.forEach(d => counts[Number(d)]++);
            
            const chartArea = document.getElementById('chart-bars');
            chartArea.innerHTML = "";
            
            counts.forEach((count, i) => {
                const percentage = (count / tickHistory.length) * 100 || 0;
                const bar = document.createElement('div');
                bar.className = "flex flex-col items-center w-full";
                bar.innerHTML = `
                    <div class="bar w-2 bg-[#FF8C00] shadow-[0_0_5px_#FF8C00]" style="height: ${percentage * 2}px"></div>
                    <span class="text-[8px] mt-1">${i}</span>
                `;
                chartArea.appendChild(bar);
            });
        }

        initConnection();
    </script>
</body>
</html>
