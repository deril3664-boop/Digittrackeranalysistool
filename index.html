<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigitFlowPro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#ff8c00;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
}

/* MAIN LAYOUT */
#app{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:8px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
}

.header button{
  background:none;
  border:none;
  color:#ff8c00;
}

.live{
  color:#00ff00;
  font-weight:bold;
}

/* TITLE AREA */
.top{
  text-align:center;
}

.top h3{
  font-size:14px;
  margin:2px 0;
}

select{
  width:100%;
  background:#111;
  border:1px solid #ff8c00;
  color:#ff8c00;
  padding:5px;
  margin:4px 0;
}

/* PRICE */
.price{
  font-size:28px;
  text-shadow:0 0 8px #ff8c00;
  margin:2px 0;
}

/* BUTTON */
#toggle{
  font-size:12px;
  padding:6px 12px;
  margin:4px auto;
  display:block;
  background:transparent;
  border:1px solid red;
  color:red;
}

/* CENTER STAGE */
.stage{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
}

/* MAIN CIRCLE */
.main-circle{
  width:110px;
  height:110px;
  border:3px solid #ff8c00;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:44px;
  box-shadow:0 0 12px #ff8c00;
}

/* SUB CIRCLES */
.sub{
  display:flex;
  justify-content:space-between;
  width:80%;
  margin-top:6px;
}

.small-circle{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.match{
  border:2px solid #ff8c00;
}

.diff{
  border:2px solid red;
}

/* PERCENT */
.percent{
  text-align:center;
  font-size:11px;
}

/* CHART */
.chart{
  height:120px;
  border:1px solid #ff8c00;
  padding:6px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.chart-title{
  font-size:10px;
}

.bars{
  display:flex;
  align-items:flex-end;
  height:90px;
}

.bar{
  width:8%;
  margin:0 1%;
  background:#ff8c00;
  transition:height .2s ease;
}
</style>
</head>

<body>

<div id="app">

  <!-- HEADER -->
  <div class="header">
    <button onclick="location.reload()">← Back</button>
    <div>DigitFlowPro</div>
    <div class="live">● LIVE</div>
  </div>

  <!-- TOP -->
  <div class="top">
    <h3>Matches / Differs</h3>
    <select id="symbol"></select>
    <div id="price" class="price">0.00</div>
  </div>

  <!-- STAGE -->
  <div class="stage">

    <button id="toggle">START ANALYSIS</button>

    <div class="main-circle" id="digit">0</div>

    <div class="sub">
      <div>
        <div class="small-circle match" id="matchVal">0</div>
        <div class="percent" id="matchPct">0%</div>
      </div>

      <div>
        <div class="small-circle diff" id="diffVal">0</div>
        <div class="percent" id="diffPct">0%</div>
      </div>
    </div>

  </div>

  <!-- CHART -->
  <div class="chart">
    <div class="chart-title">DIGIT FREQUENCY (100 TICKS)</div>
    <div class="bars" id="bars"></div>
  </div>

</div>

<script>

// =====================
// WEBSOCKET
// =====================
let ws;
let latestPrice=null;
let symbol="R_10";

ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=131595");

ws.onopen = ()=>{
  subscribe(symbol);
};

function subscribe(sym){
  ws.send(JSON.stringify({ticks:sym,subscribe:1}));
}

ws.onmessage = (msg)=>{
  let data = JSON.parse(msg.data);
  if(data.tick){
    let p = data.tick.quote.toFixed(2);
    latestPrice = p;
    document.getElementById("price").innerText = p;
  }
};

// =====================
// SYMBOLS
// =====================
let list=["R_10","R_10_1S","R_25","R_25_1S","R_50","R_50_1S","R_75","R_75_1S","R_100","R_100_1S"];

list.forEach(s=>{
  let o=document.createElement("option");
  o.value=s;
  o.text=s;
  symbolEl.appendChild(o);
});

// =====================
// ANALYSIS
// =====================
let buffer=[];

toggle.onclick = async ()=>{
  buffer=[];
  digit.innerText="...";

  await collect(100);

  let r = analyze(buffer);

  show(r);
  chart(buffer);
};

// =====================
// FAST BUFFER
// =====================
function collect(n){
  return new Promise(res=>{
    let c=0;
    let i=setInterval(()=>{
      if(!latestPrice)return;

      buffer.push(parseInt(latestPrice.slice(-1)));
      c++;

      if(c>=n){
        clearInterval(i);
        res();
      }
    },8);
  });
}

// =====================
// STRATEGY
// =====================
function analyze(d){

  let f=Array(10).fill(0);
  let m=0,df=0;

  for(let i=0;i<d.length;i++){
    f[d[i]]++;
    if(i>0){
      d[i]==d[i-1]?m++:df++;
    }
  }

  let max=f.indexOf(Math.max(...f));
  let min=f.indexOf(Math.min(...f));

  let s=m/(m+df||1);

  if(s>0.6){
    return {signal:"MATCH",digit:max,confidence:85};
  }else{
    return {signal:"DIFFERS",digit:min,confidence:75};
  }
}

// =====================
// DISPLAY
// =====================
function show(r){

  digit.innerText=r.digit;

  if(r.signal==="MATCH"){
    matchVal.innerText=r.digit;
    matchPct.innerText=r.confidence+"%";
    diffVal.innerText="-";
    diffPct.innerText="0%";
  }else{
    diffVal.innerText=r.digit;
    diffPct.innerText=r.confidence+"%";
    matchVal.innerText="-";
    matchPct.innerText="0%";
  }
}

// =====================
// CHART
// =====================
function chart(d){

  bars.innerHTML="";
  let f=Array(10).fill(0);
  d.forEach(x=>f[x]++);

  let max=Math.max(...f);

  f.forEach(v=>{
    let b=document.createElement("div");
    b.className="bar";
    b.style.height=(v/max)*100+"%";
    bars.appendChild(b);
  });
}

</script>

</body>
</html>
