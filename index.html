<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AimagicsPro - Binary Options</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Responsive Scaling for Desktop and Mobile */
        .app-shell {
            width: 100%;
            max-width: 400px;
            background: #f9fafb;
            min-height: 800px;
            height: 92vh;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 640px) {
            .app-shell {
                height: 100vh;
                border-radius: 0;
                max-width: none;
            }
        }

        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); }
        }
        .prediction-pulse { animation: pulse-ring 1.5s infinite; }
        .dropdown-enter { animation: dropdown-in 0.15s ease-out; }
        @keyframes dropdown-in {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <header class="bg-gradient-to-r from-gray-900 via-gray-800 to-gray-900 text-white px-4 py-4 flex items-center justify-between shadow-md">
            <h1 class="text-lg font-semibold tracking-wide">AimagicsPro</h1>
            <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400 font-medium">CapCut</span>
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
                </svg>
            </div>
        </header>

        <div class="mx-4 mt-4 mb-6">
            <div class="bg-cyan-50 border border-cyan-200 rounded-lg py-2.5 px-4 text-center">
                <p class="text-cyan-700 text-sm font-semibold tracking-wide uppercase">
                    Welcome Amos to Binary Option
                </p>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto">
            <div id="screen-indices" class="px-4 pb-6">
                <label class="block text-gray-900 text-xl font-bold mb-3">Binary Indices</label>
                <button onclick="toggleDropdown('indices')" class="w-full bg-gray-100 border-2 border-gray-300 rounded-xl py-4 px-4 text-left flex items-center justify-between">
                    <span id="selected-index" class="text-gray-800 font-medium">Volatility 10 Index</span>
                    <i data-lucide="chevron-down" class="w-5 h-5 text-gray-500" id="indices-chevron"></i>
                </button>
                <div id="indices-dropdown" class="hidden absolute left-4 right-4 mt-1 bg-white rounded-xl shadow-xl z-50 border border-gray-200 dropdown-enter overflow-hidden">
                    <div class="max-h-[300px] overflow-y-auto" id="indices-list"></div>
                </div>
                <button onclick="goToTradeType()" class="w-full mt-10 py-4 rounded-xl font-bold bg-blue-500 text-white shadow-lg shadow-blue-200 active:scale-95 transition-all">Next</button>
            </div>

            <div id="screen-tradeType" class="hidden px-4 pb-6">
                <label class="block text-gray-900 text-xl font-bold mb-3">Trade Type</label>
                <button onclick="toggleDropdown('tradeType')" class="w-full bg-gray-100 border-2 border-gray-300 rounded-xl py-4 px-4 text-left flex items-center justify-between">
                    <span id="selected-trade" class="text-gray-800 font-medium">Over</span>
                    <i data-lucide="chevron-down" class="w-5 h-5 text-gray-500" id="tradeType-chevron"></i>
                </button>
                <div id="tradeType-dropdown" class="hidden absolute left-4 right-4 mt-1 bg-white rounded-xl shadow-xl z-50 border border-gray-200 dropdown-enter">
                    <div id="tradeType-list"></div>
                </div>
                <div class="space-y-3 mt-10">
                    <button onclick="goToAnalysis()" class="w-full py-4 rounded-xl font-bold bg-blue-500 text-white shadow-lg active:scale-95 transition-all">Start Terminal</button>
                    <button onclick="goToIndices()" class="w-full py-4 rounded-xl font-bold bg-gray-400 text-white active:scale-95 transition-all">Back</button>
                </div>
            </div>

            <div id="screen-analysis" class="hidden">
                <div class="px-4 mt-2">
                    <div class="grid grid-cols-5 gap-2" id="digit-grid-top"></div>
                    <div class="grid grid-cols-5 gap-2 mt-2" id="digit-grid-bottom"></div>
                </div>

                <div id="prediction-container" class="mt-12 flex flex-col items-center">
                    <div class="w-28 h-28 rounded-full border-4 border-blue-500 flex items-center justify-center bg-white prediction-pulse shadow-xl">
                        <span id="final-recommendation" class="font-black text-blue-700">-</span>
                    </div>
                    <p id="confidence-text" class="text-[10px] text-blue-500 mt-4 font-bold uppercase tracking-widest"></p>
                </div>

                <div class="px-4 mt-12 space-y-3">
                    <button onclick="requestSignal()" id="run-btn" class="w-full py-4 rounded-xl font-bold bg-blue-500 text-white shadow-lg active:scale-95 transition-all">Get Signal</button>
                    <button onclick="goToTradeType()" class="w-full py-4 rounded-xl font-bold bg-gray-400 text-white active:scale-95 transition-all">Back</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // --- SILENT WEBSOCKET LOGIC ---
        const A_I = '131595'; // Hidden App ID
        let ws;
        let tickHistory = [];
        const indexMap = {
            'Volatility 10 Index': 'R_10', 'Volatility 10 (1s) Index': '1HZ10V',
            'Volatility 25 Index': 'R_25', 'Volatility 25 (1s) Index': '1HZ25V',
            'Volatility 50 Index': 'R_50', 'Volatility 50 (1s) Index': '1HZ50V',
            'Volatility 75 Index': 'R_75', 'Volatility 75 (1s) Index': '1HZ75V',
            'Volatility 100 Index': 'R_100', 'Volatility 100 (1s) Index': '1HZ100V'
        };

        function connectWS() {
            ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${A_I}`);
            ws.onopen = () => subscribeToTicks();
            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);
                if (data.tick) {
                    const lastDigit = parseInt(data.tick.quote.toString().slice(-1));
                    updateGrid(lastDigit);
                }
            };
            ws.onclose = () => setTimeout(connectWS, 3000);
        }

        function subscribeToTicks() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const symbol = indexMap[selectedIndex] || 'R_10';
                ws.send(JSON.stringify({ forget_all: "ticks" }));
                ws.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
            }
        }

        function updateGrid(newDigit) {
            tickHistory.push(newDigit);
            if (tickHistory.length > 50) tickHistory.shift();

            const counts = new Array(10).fill(0);
            tickHistory.forEach(d => counts[d]++);
            const probs = counts.map(c => (c / tickHistory.length) * 100);

            const card = (d, p) => `<div class="bg-white rounded-xl p-3 flex flex-col items-center justify-center border-2 border-gray-200 shadow-sm"><span class="text-xl font-bold text-gray-800">${d}</span><span class="text-[9px] mt-1 text-blue-500 font-black">${p.toFixed(0)}%</span></div>`;
            
            document.getElementById('digit-grid-top').innerHTML = [0,1,2,3,4].map(i => card(i, probs[i])).join('');
            document.getElementById('digit-grid-bottom').innerHTML = [5,6,7,8,9].map(i => card(i, probs[i])).join('');
        }

        function requestSignal() {
            if (tickHistory.length < 5) return;
            
            const counts = new Array(10).fill(0);
            tickHistory.forEach(d => counts[d]++);
            const probs = counts.map(c => (c / tickHistory.length) * 100);
            const sorted = [...probs].sort((a,b)=>b-a);
            
            const recEl = document.getElementById('final-recommendation');
            const isWordTrade = ['Even/Odd', 'Rise/Fall'].includes(selectedTradeType);

            if (isWordTrade) {
                const signal = selectedTradeType === 'Even/Odd' ? 
                    (probs.filter((_,i)=>i%2===0).reduce((a,b)=>a+b,0) > 50 ? "EVEN" : "ODD") : 
                    (tickHistory[tickHistory.length-1] > tickHistory[tickHistory.length-2] ? "RISE" : "FALL");
                recEl.textContent = signal;
                recEl.className = "font-black text-blue-700 text-xl uppercase";
            } else {
                recEl.textContent = tickHistory[tickHistory.length-1];
                recEl.className = "font-black text-blue-700 text-5xl";
            }

            document.getElementById('confidence-text').textContent = `Dominance: ${Math.round(sorted[0])}%`;
            document.getElementById('prediction-container').classList.remove('hidden');
        }

        // --- NAVIGATION & UI ---
        let selectedIndex = 'Volatility 10 Index', selectedTradeType = 'Over';

        function populate() {
            const list = Object.keys(indexMap);
            document.getElementById('indices-list').innerHTML = list.map(i => `<button onclick="setIdx('${i}')" class="w-full text-left py-4 px-5 hover:bg-gray-50 border-b border-gray-100 text-sm font-semibold text-gray-700">${i}</button>`).join('');
            const types = ['Over','Under','Matches','Differs','Even/Odd','Rise/Fall'];
            document.getElementById('tradeType-list').innerHTML = types.map(t => `<button onclick="setTrade('${t}')" class="w-full text-left py-4 px-5 hover:bg-gray-50 border-b border-gray-100 text-sm font-semibold text-gray-700">${t}</button>`).join('');
        }

        function setIdx(v) { selectedIndex = v; document.getElementById('selected-index').textContent = v; toggleDropdown('indices'); if(ws) subscribeToTicks(); }
