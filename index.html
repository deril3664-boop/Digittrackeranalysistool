<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Digit Tracker Analysis Tool</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: orange;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* PAGE CONTROL */
.page {
  display: none;
}
.active {
  display: block;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.live {
  color: lime;
  font-weight: bold;
}

/* CENTER */
.center {
  text-align: center;
  margin-top: 40px;
}

/* BUTTON */
button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: orange;
  color: black;
  margin-top: 15px;
}

/* DROPDOWN */
select {
  width: 90%;
  padding: 10px;
  margin-top: 10px;
}

/* PRICE */
.price {
  font-size: 24px;
  margin: 10px;
}

/* LOADING CIRCLE */
.loader {
  width: 120px;
  height: 120px;
  border: 5px solid rgba(255,140,0,0.2);
  border-top: 5px solid orange;
  border-radius: 50%;
  margin: 20px auto;
  animation: spin 0.5s linear;
  display: none;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* SCORE */
.score {
  width: 120px;
  height: 120px;
  border: 4px solid orange;
  border-radius: 50%;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* MATCH DIFF */
.row {
  display: flex;
  justify-content: space-around;
  margin-top: 15px;
}

.circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 3px solid orange;
  display: flex;
  align-items: center;
  justify-content: center;
}
.red {
  border-color: red;
}

/* CHART */
.chart {
  margin-top: 20px;
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
}
.bar {
  width: 6%;
  background: orange;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="center">
    <h2>Digit Tracker Analysis Tool</h2>
    <button onclick="connectWS()">Connect WebSocket</button>
    <div id="status"></div>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">

  <div class="header">
    <button onclick="goBack()">⬅ BACK</button>
    <div>Digit Tracker</div>
    <div id="live" class="live">LIVE</div>
  </div>

  <div class="center">
    <h3>Matches / Differs</h3>

    <select id="market" onchange="changeMarket()">
      <option value="R_10">Volatility 10 (1s)</option>
      <option value="R_25">Volatility 25</option>
      <option value="R_50">Volatility 50</option>
      <option value="R_75">Volatility 75</option>
      <option value="R_100">Volatility 100</option>
    </select>

    <div class="price" id="price">--</div>

    <button onclick="toggleAnalysis()" id="btn">START ANALYSIS</button>

    <div class="loader" id="loader"></div>

    <div class="score" id="score">0</div>

    <div class="row">
      <div>
        MATCH
        <div class="circle" id="match">0</div>
        <div id="matchP">0%</div>
      </div>

      <div>
        DIFFERS
        <div class="circle red" id="diff">0</div>
        <div id="diffP">0%</div>
      </div>
    </div>

    <div class="chart" id="chart"></div>

  </div>

</div>

<script>
let ws;
let digits = [];
let analyzing = false;
let currentSymbol = "R_10";

/* CONNECT */
function connectWS() {
  ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=131595");

  ws.onopen = () => {
    document.getElementById("status").innerText = "LIVE";
    showPage(2);
    subscribe();
  };

  ws.onclose = () => {
    document.getElementById("status").innerText = "Connection Failed";
  };

  ws.onmessage = (msg) => {
    let data = JSON.parse(msg.data);

    if (data.tick) {
      let price = data.tick.quote;
      document.getElementById("price").innerText = price;

      let digit = parseInt(price.toString().slice(-1));
      digits.push(digit);
      if (digits.length > 100) digits.shift();

      if (analyzing) updateUI();
    }
  };
}

/* PAGE SWITCH */
function showPage(p) {
  document.getElementById("page1").classList.remove("active");
  document.getElementById("page2").classList.remove("active");
  document.getElementById("page" + p).classList.add("active");
}

/* BACK */
function goBack() {
  showPage(1);
}

/* MARKET CHANGE */
function changeMarket() {
  currentSymbol = document.getElementById("market").value;
  digits = [];
  ws.close();
  connectWS();
}

/* SUBSCRIBE */
function subscribe() {
  ws.send(JSON.stringify({
    ticks: currentSymbol,
    subscribe: 1
  }));
}

/* TOGGLE */
function toggleAnalysis() {
  analyzing = !analyzing;

  document.getElementById("btn").innerText =
    analyzing ? "STOP ANALYSIS" : "START ANALYSIS";

  let loader = document.getElementById("loader");
  loader.style.display = "block";

  setTimeout(() => {
    loader.style.display = "none";
    updateUI();
  }, 500);
}

/* UPDATE */
function updateUI() {
  let freq = Array(10).fill(0);

  digits.forEach(d => freq[d]++);

  let last = digits[digits.length-1];
  let match = freq[last];
  let diff = digits.length - match;

  document.getElementById("match").innerText = match;
  document.getElementById("diff").innerText = diff;

  document.getElementById("matchP").innerText =
    Math.round((match/digits.length)*100) + "%";

  document.getElementById("diffP").innerText =
    Math.round((diff/digits.length)*100) + "%";

  document.getElementById("score").innerText =
    Math.round((match/digits.length)*10);

  drawChart(freq);
}

/* CHART */
function drawChart(freq) {
  let chart = document.getElementById("chart");
  chart.innerHTML = "";

  freq.forEach(v => {
    let bar = document.createElement("div");
    bar.className = "bar";
    bar.style.height = (v * 4) + "px";
    chart.appendChild(bar);
  });
}

/* MATRIX */
let c = document.getElementById("matrix");
let ctx = c.getContext("2d");

c.height = window.innerHeight;
c.width = window.innerWidth;

let letters = "0123456789";
letters = letters.split("");

let fontSize = 10;
let columns = c.width / fontSize;
let drops = [];

for (let i = 0; i < columns; i++) drops[i] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, c.width, c.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > c.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);
</script>

</body>
</html>
