<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigitFlowPro</title>

<style>
body{
    margin:0;
    background:#000;
    color:#ff8c00;
    font-family:Arial;
    overflow:hidden;
}

/* MATRIX BACKGROUND */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* UI LAYER */
.app{
    position:relative;
    z-index:2;
    padding:10px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.live{
    color:#00ff00;
    font-weight:bold;
}

/* TITLE */
.title{
    text-align:center;
    font-size:22px;
    margin:10px 0;
}

/* DROPDOWN */
select{
    width:100%;
    padding:10px;
    background:#111;
    border:1px solid #ff8c00;
    color:#ff8c00;
}

/* PRICE */
.price{
    text-align:center;
    font-size:28px;
    margin:10px 0;
}

/* BUTTON */
.btn{
    display:block;
    margin:10px auto;
    padding:10px 20px;
    border:1px solid red;
    background:transparent;
    color:red;
}

/* MAIN CIRCLE */
.circle{
    width:120px;
    height:120px;
    border:4px solid #ff8c00;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    margin:10px auto;
}

/* MATCH / DIFFER */
.row{
    display:flex;
    justify-content:space-around;
}

.small{
    width:90px;
    height:90px;
    border-radius:50%;
    border:2px solid #ff8c00;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}

/* CHART */
.chart{
    display:flex;
    align-items:flex-end;
    height:150px;
    margin-top:20px;
}

.bar{
    flex:1;
    margin:2px;
    background:#ff8c00;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="app">

<div class="header">
<button onclick="back()">← Back</button>
<div>DigitFlowPro</div>
<div class="live" id="live">● LIVE</div>
</div>

<div class="title">Matches / Differs</div>

<select id="vol">
<option>Volatility 10 (1s)</option>
<option>Volatility 25 (1s)</option>
<option>Volatility 50 (1s)</option>
</select>

<div class="price" id="price">--</div>

<button class="btn" id="toggle">Stop Analysis</button>

<div class="circle" id="digit">0</div>

<div class="row">
<div>
<div class="small" id="match">0</div>
<p>Match</p>
</div>

<div>
<div class="small" style="border-color:red;color:red" id="diff">0</div>
<p>Differs</p>
</div>
</div>

<div class="chart" id="chart"></div>

</div>

<script>
// MATRIX EFFECT
let c=document.getElementById("matrix");
let ctx=c.getContext("2d");
c.height=window.innerHeight;
c.width=window.innerWidth;

let letters="01";
let drops=Array(Math.floor(c.width/10)).fill(1);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#0f0";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*10,drops[i]*10);

if(drops[i]*10>c.height && Math.random()>0.95) drops[i]=0;
drops[i]++;
}
}
setInterval(draw,50);

// SIMULATION LOGIC
let price=9780;
let lastDigit=null;
let match=0;
let diff=0;
let counts=Array(10).fill(0);
let running=true;

document.getElementById("toggle").onclick=()=>{
running=!running;
document.getElementById("toggle").innerText=running?"Stop Analysis":"Start Analysis";
};

function tick(){
if(running){
price+=Math.random()*2-1;
let p=price.toFixed(2);
document.getElementById("price").innerText=p;

let d=parseInt(p.slice(-1));
document.getElementById("digit").innerText=d;

counts[d]++;

if(lastDigit!==null){
if(d===lastDigit) match++;
else diff++;
}

lastDigit=d;

document.getElementById("match").innerText=match;
document.getElementById("diff").innerText=diff;

drawChart();
}
}

setInterval(tick,1000);

function drawChart(){
let chart=document.getElementById("chart");
chart.innerHTML="";

let max=Math.max(...counts);

counts.forEach(c=>{
let bar=document.createElement("div");
bar.className="bar";
bar.style.height=(c/max*100)+"%";
chart.appendChild(bar);
});
}

function back(){
alert("Go back to connection page");
}
</script>

</body>
</html>
