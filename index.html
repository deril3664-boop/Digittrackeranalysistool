<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Digit Tracker Analysis Tool</title>

<style>
body {
  margin:0;
  background:#000;
  color:#FF8C00;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
}

.center {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.hidden { display:none; }

/* ===== LANDING ===== */
#landing h1 { font-size:20px; margin-bottom:20px; }
#status { margin-top:10px; }

button {
  padding:10px 20px;
  border:1px solid #FF8C00;
  background:none;
  color:#FF8C00;
}

/* ===== DASHBOARD ===== */
#dashboard { padding:10px; height:100vh; }

.header {
  display:flex;
  justify-content:space-between;
}

.live { color:#00FF00; }

.title { text-align:center; margin:10px; }

.index-box {
  border:1px solid #FF8C00;
  border-radius:10px;
  padding:10px;
  text-align:center;
}

.price {
  font-size:26px;
  text-shadow:0 0 10px #FF8C00;
}

.main-circle {
  width:130px;
  height:130px;
  border:3px solid #FF8C00;
  border-radius:50%;
  margin:10px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.row {
  display:flex;
  justify-content:space-around;
}

.small-circle {
  width:80px;
  height:80px;
  border-radius:50%;
  border:2px solid #FF8C00;
  display:flex;
  align-items:center;
  justify-content:center;
}

.red {
  border-color:red;
  color:red;
}

.chart {
  margin-top:10px;
  border:1px solid #FF8C00;
  padding:10px;
}

.bars {
  display:flex;
  height:100px;
  align-items:flex-end;
}

.bar {
  flex:1;
  margin:2px;
  background:#FF8C00;
}
</style>
</head>

<body>

<!-- ================= LANDING ================= -->
<div id="landing" class="center">
  <h1>Digit Tracker Analysis Tool</h1>
  <button onclick="connect()">Connect WebSocket</button>
  <div id="status">Not Connected</div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" class="hidden">

  <div class="header">
    <button onclick="goBack()">Back</button>
    <div>DigitFlowPro</div>
    <div class="live">● LIVE</div>
  </div>

  <div class="title">Matches / Differs</div>

  <select id="vol">
    <option>Volatility 10 (1s)</option>
  </select>

  <div class="index-box">
    Volatility 10 (1s)
    <div class="price" id="price">0.00</div>
  </div>

  <button onclick="toggle()" id="toggleBtn">START ANALYSIS</button>

  <div class="main-circle" id="digit">0</div>

  <div class="row">
    <div>
      <div class="small-circle" id="match">0</div>
      <div>MATCH</div>
    </div>

    <div>
      <div class="small-circle red" id="diff">0</div>
      <div>DIFFERS</div>
    </div>
  </div>

  <div class="chart">
    <div>DIGIT FREQUENCY (100 TICKS)</div>
    <div class="bars" id="bars"></div>
  </div>

</div>

<script>
let ws;
let ticks=[];
let running=false;

/* CONNECT */
function connect(){
  document.getElementById("status").innerText="Connecting...";

  ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=131595");

  ws.onopen=()=>{
    document.getElementById("status").innerText="LIVE";

    // REDIRECT
    setTimeout(()=>{
      document.getElementById("landing").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
    },1000);

    ws.send(JSON.stringify({ticks:"R_10"}));
  };

  ws.onerror=()=>{
    document.getElementById("status").innerText="Connection Failed";
  };

  ws.onmessage=(msg)=>{
    let data=JSON.parse(msg.data);

    if(data.tick){
      let price=data.tick.quote;
      document.getElementById("price").innerText=price;

      let digit=price.toString().slice(-1);
      document.getElementById("digit").innerText=digit;

      ticks.push(Number(digit));
      if(ticks.length>100) ticks.shift();

      updateChart();
    }
  };
}

/* ANALYSIS */
function toggle(){
  running=!running;
  document.getElementById("toggleBtn").innerText=
    running?"STOP ANALYSIS":"START ANALYSIS";

  if(running) analyze();
}

function analyze(){
  if(!running) return;

  document.getElementById("match").innerText=Math.floor(Math.random()*10);
  document.getElementById("diff").innerText=Math.floor(Math.random()*10);

  setTimeout(analyze,500);
}

/* CHART */
function updateChart(){
  let count=Array(10).fill(0);
  ticks.forEach(d=>count[d]++);

  let bars=document.getElementById("bars");
  bars.innerHTML="";

  count.forEach(c=>{
    let b=document.createElement("div");
    b.className="bar";
    b.style.height=(c*2)+"px";
    bars.appendChild(b);
  });
}

/* BACK */
function goBack(){
  location.reload();
}
</script>

</body>
</html>
