<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AimagicsPro - Complete Indices</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; }
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
        }
        .prediction-pulse { animation: pulse-ring 1.5s infinite; }
        .dropdown-enter { animation: dropdown-in 0.15s ease-out; }
        @keyframes dropdown-in {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-sm bg-gray-50 min-h-[850px] rounded-3xl overflow-hidden shadow-2xl relative">
        <header class="bg-gradient-to-r from-gray-900 via-gray-800 to-gray-900 text-white px-4 py-3 flex items-center justify-between shadow-md">
            <h1 class="text-lg font-semibold tracking-wide">AimagicsPro</h1>
            <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400 font-medium">All Indices Enabled</span>
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
                </svg>
            </div>
        </header>

        <div class="mx-4 mt-4 mb-4">
            <div class="bg-blue-50 border border-blue-100 rounded-lg py-2 px-4 text-center">
                <p class="text-blue-700 text-xs font-bold uppercase tracking-wider">Market Analysis Terminal</p>
            </div>
        </div>

        <div id="screen-indices" class="px-4 pb-6">
            <label class="block text-gray-900 text-xl font-bold mb-3">Binary Indices</label>
            <button onclick="toggleDropdown('indices')" class="w-full bg-gray-100 border-2 border-gray-300 rounded-xl py-3.5 px-4 text-left flex items-center justify-between">
                <span id="selected-index" class="font-medium">10 index</span>
                <i data-lucide="chevron-down" id="indices-chevron"></i>
            </button>
            <div id="indices-dropdown" class="hidden absolute left-4 right-4 mt-1 bg-white rounded-xl shadow-xl z-50 border border-gray-200 dropdown-enter overflow-hidden">
                <div class="max-h-[400px] overflow-y-auto" id="indices-list"></div>
            </div>
            <button onclick="goToTradeType()" class="w-full mt-8 py-4 rounded-xl font-bold bg-blue-500 text-white shadow-lg active:scale-95 transition-transform">Next</button>
        </div>

        <div id="screen-tradeType" class="hidden px-4 pb-6">
            <label class="block text-gray-900 text-xl font-bold mb-3">Trade Type</label>
            <button onclick="toggleDropdown('tradeType')" class="w-full bg-gray-100 border-2 border-gray-300 rounded-xl py-3.5 px-4 text-left flex items-center justify-between">
                <span id="selected-trade" class="font-medium">Over</span>
                <i data-lucide="chevron-down" id="tradeType-chevron"></i>
            </button>
            <div id="tradeType-dropdown" class="hidden absolute left-4 right-4 mt-1 bg-white rounded-xl shadow-xl z-50 border border-gray-200 dropdown-enter">
                <div id="tradeType-list"></div>
            </div>
            <div class="space-y-3 mt-8">
                <button onclick="goToAnalysis()" class="w-full py-4 rounded-xl font-bold bg-blue-500 text-white shadow-lg">Confirm Selection</button>
                <button onclick="goToIndices()" class="w-full py-4 rounded-xl font-bold bg-gray-400 text-white">Back</button>
            </div>
        </div>

        <div id="screen-analysis" class="hidden">
            <div class="px-4 mt-2">
                <div class="grid grid-cols-5 gap-2" id="digit-grid-top"></div>
                <div class="grid grid-cols-5 gap-2 mt-2" id="digit-grid-bottom"></div>
            </div>

            <div id="analysis-status" class="flex items-center justify-center gap-2 mt-5 text-gray-500 hidden">
                <i data-lucide="activity" class="w-4 h-4 animate-pulse"></i>
                <span class="text-sm italic font-medium">Monitoring Real-Time Ticks...</span>
            </div>

            <div id="prediction-container" class="hidden mt-6 flex flex-col items-center">
                <div class="relative">
                    <div class="w-28 h-28 rounded-full border-4 border-blue-500 flex items-center justify-center bg-white prediction-pulse shadow-2xl">
                        <span id="final-recommendation" class="font-black text-blue-700">-</span>
                    </div>
                </div>
                <p id="confidence-text" class="text-[10px] text-blue-500 mt-3 font-bold tracking-widest uppercase"></p>
            </div>

            <div class="px-4 mt-8 space-y-3">
                <button onclick="startAnalysis()" id="run-btn" class="w-full py-4 rounded-xl font-bold bg-blue-500 text-white shadow-lg active:scale-95 transition-transform">Run Analysis</button>
                <button onclick="goToTradeType()" class="w-full py-4 rounded-xl font-bold bg-gray-400 text-white">Back</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- TRADING ENGINE ---
        const TradingEngine = (function() {
            let instance;
            let tickBuffer = [];
            let lastSignal = null;
            let signalCount = 0;
            const CONFIRMATION_TICKS = 3;
            const PROBABILITY_GAP = 15;

            return {
                getInstance: function() {
                    if (!instance) {
                        instance = {
                            analyze: function(newTick, tradeType) {
                                tickBuffer.push(newTick);
                                if (tickBuffer.length > 50) tickBuffer.shift();
                                if (tickBuffer.length < 25) return { rec: null, allProbs: new Array(10).fill(0) };

                                const counts = new Array(10).fill(0);
                                tickBuffer.forEach(d => counts[d]++);
                                const probs = counts.map(c => (c / tickBuffer.length) * 100);
                                const sorted = [...probs].sort((a,b)=>b-a);
                                const isStable = (sorted[0] - sorted[1]) >= PROBABILITY_GAP;

                                let signal = null;
                                let outputValue = null;

                                if (tradeType === 'Matches' || tradeType === 'Differs') {
                                    const targetDigit = probs.indexOf(sorted[0]);
                                    signal = tradeType === 'Matches' ? `M_${targetDigit}` : `D_${targetDigit}`;
                                    outputValue = targetDigit.toString(); // FIGURE
                                }
                                else if (tradeType === 'Over' || tradeType === 'Under') {
                                    const threshold = tradeType === 'Over' ? 5 : 4;
                                    signal = tradeType.toUpperCase();
                                    outputValue = threshold.toString(); // FIGURE
                                }
                                else if (tradeType === 'Even/Odd') {
                                    const evenProb = probs.filter((_,i)=>i%2===0).reduce((a,b)=>a+b,0);
                                    signal = evenProb > 50 ? "EVEN" : "ODD";
                                    outputValue = signal; // WORD
                                }
                                else if (tradeType === 'Rise/Fall') {
                                    const last = tickBuffer[tickBuffer.length-1];
                                    const prev = tickBuffer[tickBuffer.length-2];
                                    signal = last > prev ? "RISE" : "FALL";
                                    outputValue = signal; // WORD
                                }

                                if (signal && signal === lastSignal) signalCount++;
                                else { lastSignal = signal; signalCount = 1; }

                                if (signalCount >= CONFIRMATION_TICKS && isStable) {
                                    return { rec: outputValue, conf: Math.round(sorted[0]), allProbs: probs };
                                }
                                return { rec: null, allProbs: probs };
                            },
                            reset: () => { tickBuffer = []; lastSignal = null; signalCount = 0; }
                        };
                    }
                    return instance;
                }
            };
        })();

        // --- DATA ---
        const indexList = [
            '10','10 (1s)','25','25 (1s)','50','50 (1s)','75','75 (1s)','100','100 (1s)'
        ].map(v => ({value:v, label:v+' index'}));

        const tradeTypes = ['Over','Under','Matches','Differs','Even/Odd','Rise/Fall'].map(v => ({value:v, label:v}));

        let selectedIndex = '10', selectedTradeType = 'Over', isAnalyzing = false, analysisInterval;

        // --- UI CORE ---
        function populateDropdowns() {
            document.getElementById('indices-list').innerHTML = indexList.map(o => `<button onclick="selectIndex('${o.value}')" class="w-full text-left py-4 px-5 hover:bg-blue-50 border-b border-gray-50 text-sm font-semibold text-gray-700">${o.label}</button>`).join('');
            document.getElementById('tradeType-list').innerHTML = tradeTypes.map(o => `<button onclick="selectTradeType('${o.value}')" class="w-full text-left py-4 px-5 hover:bg-blue-50 border-b border-gray-50 text-sm font-semibold text-gray-700">${o.label}</button>`).join('');
        }

        function toggleDropdown(id) { document.getElementById(`${id}-dropdown`).classList.toggle('hidden'); }
        function selectIndex(v) { selectedIndex = v; document.getElementById('selected-index').textContent = v + ' index'; toggleDropdown('indices'); }
        function selectTradeType(v) { selectedTradeType = v; document.getElementById('selected-trade').textContent = v; toggleDropdown('tradeType'); }

        function toggleScreen(id) {
            ['screen-indices','screen-tradeType','screen-analysis'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function goToTradeType() { toggleScreen('screen-tradeType'); }
        function goToIndices() { toggleScreen('screen-indices'); }
        function goToAnalysis() { toggleScreen('screen-analysis'); initDigitGrid(); }

        function initDigitGrid(probs = new Array(10).fill(0)) {
            const createCard = (i, p) => `<div class="bg-white border-2 rounded-xl p-2.5 flex flex-col items-center"><span class="text-xl font-bold text-gray-800">${i}</span><span class="text-[9px] font-bold text-blue-600">${p.toFixed(1)}%</span></div>`;
            document.getElementById('digit-grid-top').innerHTML = [0,1,2,3,4].map(i => createCard(i, probs[i])).join('');
            document.getElementById('digit-grid-bottom').innerHTML = [5,6,7,8,9].map(i => createCard(i, probs[i])).join('');
        }

        function startAnalysis() {
            if (isAnalyzing) return;
            isAnalyzing = true;
            const engine = TradingEngine.getInstance();
            engine.reset();

            document.getElementById('analysis-status').classList.remove('hidden');
            document.getElementById('prediction-container').classList.add('hidden');
            document.getElementById('run-btn').textContent = 'Searching Stability...';

            analysisInterval = setInterval(() => {
                const tick = Math.floor(Math.random() * 10);
                const result = engine.analyze(tick, selectedTradeType);
                initDigitGrid(result.allProbs);

                if (result.rec) {
                    clearInterval(analysisInterval);
                    isAnalyzing = false;
                    document.getElementById('analysis-status').classList.add('hidden');
                    document.getElementById('prediction-container').classList.remove('hidden');
                    
                    const recEl = document.getElementById('final-recommendation');
                    recEl.textContent = result.rec;
                    
                    // Display Rules: Words (Smaller Font) vs Figures (Large Font)
                    const isWord = ['EVEN','ODD','RISE','FALL'].includes(result.rec);
                    recEl.className = `font-black text-blue-700 ${isWord ? 'text-2xl' : 'text-5xl'}`;

                    document.getElementById('confidence-text').textContent = `Market Dominance: ${result.conf}%`;
                    document.getElementById('run-btn').textContent = 'Run Analysis';
                }
            }, 300);
        }

        populateDropdowns();
    </script>
</body>
</html>
