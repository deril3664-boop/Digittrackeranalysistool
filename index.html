<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>DigitFlowPro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#ff8c00;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
}

/* MAIN */
#app{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:2vh 3vw;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:2.5vw;
}

.header button{
  background:none;
  border:none;
  color:#ff8c00;
  font-size:3vw;
}

.live{
  color:#00ff00;
  font-weight:bold;
}

/* TOP */
.top{
  text-align:center;
}

.top h3{
  font-size:3.5vw;
  margin:0.5vh 0;
}

select{
  width:100%;
  padding:1vh;
  font-size:3vw;
  background:#111;
  border:1px solid #ff8c00;
  color:#ff8c00;
}

.price{
  font-size:6vw;
  text-shadow:0 0 8px #ff8c00;
}

/* BUTTON */
#toggle{
  font-size:3vw;
  padding:1vh 3vw;
  margin:1vh auto;
  border:1px solid red;
  background:transparent;
  color:red;
}

/* STAGE */
.stage{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* MAIN CIRCLE */
.main-circle{
  width:28vw;
  height:28vw;
  border:0.8vw solid #ff8c00;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10vw;
  box-shadow:0 0 2vw #ff8c00;
}

/* SUB */
.sub{
  display:flex;
  justify-content:space-between;
  width:70%;
  margin-top:1vh;
}

.small-circle{
  width:15vw;
  height:15vw;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:4vw;
}

.match{ border:0.5vw solid #ff8c00; }
.diff{ border:0.5vw solid red; }

.percent{
  font-size:2.5vw;
  text-align:center;
}

/* CHART */
.chart{
  height:20vh;
  border:1px solid #ff8c00;
  padding:1vh;
}

.chart-title{
  font-size:2.5vw;
}

.bars{
  display:flex;
  align-items:flex-end;
  height:14vh;
}

.bar{
  width:8%;
  margin:0 1%;
  background:#ff8c00;
  transition:height .2s;
}
</style>
</head>

<body>

<div id="app">

<!-- HEADER -->
<div class="header">
  <button onclick="location.reload()">←</button>
  <div>DigitFlowPro</div>
  <div class="live">● LIVE</div>
</div>

<!-- TOP -->
<div class="top">
  <h3>Matches / Differs</h3>
  <select id="symbol"></select>
  <div id="price" class="price">0.00</div>
</div>

<!-- STAGE -->
<div class="stage">

  <button id="toggle">START</button>

  <div class="main-circle" id="digit">0</div>

  <div class="sub">
    <div>
      <div class="small-circle match" id="matchVal">0</div>
      <div class="percent" id="matchPct">0%</div>
    </div>

    <div>
      <div class="small-circle diff" id="diffVal">0</div>
      <div class="percent" id="diffPct">0%</div>
    </div>
  </div>

</div>

<!-- CHART -->
<div class="chart">
  <div class="chart-title">DIGIT FREQUENCY (100 TICKS)</div>
  <div class="bars" id="bars"></div>
</div>

</div>

<script>
// WebSocket
let ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=131595");
let latestPrice=null;

ws.onopen=()=>subscribe("R_10");

function subscribe(s){
  ws.send(JSON.stringify({ticks:s,subscribe:1}));
}

ws.onmessage=e=>{
  let d=JSON.parse(e.data);
  if(d.tick){
    let p=d.tick.quote.toFixed(2);
    latestPrice=p;
    price.innerText=p;
  }
};

// Symbols
["R_10","R_10_1S","R_25","R_25_1S","R_50","R_50_1S","R_75","R_75_1S","R_100","R_100_1S"]
.forEach(s=>{
  let o=document.createElement("option");
  o.value=s;
  o.text=s;
  symbol.appendChild(o);
});

// Analysis
toggle.onclick=async()=>{
  let buf=[];
  digit.innerText="...";
  await new Promise(r=>{
    let c=0,i=setInterval(()=>{
      if(!latestPrice)return;
      buf.push(parseInt(latestPrice.slice(-1)));
      if(++c>=100){clearInterval(i);r();}
    },8);
  });

  let f=Array(10).fill(0),m=0,d=0;
  for(let i=0;i<buf.length;i++){
    f[buf[i]]++;
    if(i>0){buf[i]==buf[i-1]?m++:d++;}
  }

  let max=f.indexOf(Math.max(...f));
  let min=f.indexOf(Math.min(...f));
  let s=m/(m+d||1);

  if(s>0.6){
    matchVal.innerText=max;
    matchPct.innerText="85%";
    diffVal.innerText="-";
  }else{
    diffVal.innerText=min;
    diffPct.innerText="75%";
    matchVal.innerText="-";
  }

  digit.innerText=s>0.6?max:min;

  bars.innerHTML="";
  let mx=Math.max(...f);
  f.forEach(v=>{
    let b=document.createElement("div");
    b.className="bar";
    b.style.height=(v/mx)*100+"%";
    bars.appendChild(b);
  });
};
</script>

</body>
</html>
