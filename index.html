<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Digit Tracker Analysis Tool</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: black;
  color: #ff8c00;
  overflow-x: hidden;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  color: #ff8c00;
}

.header .title {
  font-size: 18px;
  font-weight: bold;
}

.live {
  color: lime;
  font-size: 14px;
}

/* MAIN WRAPPER */
.wrapper {
  width: 100%;
  max-width: 360px;
  margin: auto;
  padding: 10px;
}

/* SECTION TITLE */
.section-title {
  text-align: center;
  font-size: 20px;
  margin-top: 10px;
}

/* GLASS CARD */
.card {
  margin-top: 12px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,140,0,0.4);
  backdrop-filter: blur(6px);
}

/* PRICE */
.price-title {
  text-align: center;
  font-size: 14px;
  opacity: 0.8;
}

.price-value {
  text-align: center;
  font-size: 22px;
  margin-top: 5px;
}

/* BUTTON */
.btn {
  display: block;
  margin: 15px auto;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid red;
  background: transparent;
  color: red;
  font-size: 14px;
}

/* SCORE CIRCLE */
.score {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 4px solid #ff8c00;
  margin: 10px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  box-shadow: 0 0 15px rgba(255,140,0,0.7);
}

/* MATCH/DIFF CARD */
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.stat-box {
  width: 48%;
  text-align: center;
}

/* SMALL CIRCLES */
.circle {
  width: 75px;
  height: 75px;
  border-radius: 50%;
  border: 3px solid #ff8c00;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 5px auto;
  font-size: 18px;
  box-shadow: 0 0 10px rgba(255,140,0,0.5);
}

.circle.red {
  border-color: red;
  box-shadow: 0 0 10px rgba(255,0,0,0.5);
}

.percent {
  font-size: 13px;
  margin-top: 4px;
}

/* CHART */
.chart {
  margin-top: 15px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.bar {
  width: 8%;
  background: linear-gradient(to top, #ff8c00, #ffa500);
  border-radius: 3px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="header">
  <div class="title">DigitFlowPro</div>
  <div class="live">● LIVE</div>
</div>

<div class="wrapper">

  <div class="section-title">Matches / Differs</div>

  <!-- PRICE -->
  <div class="card">
    <div class="price-title">Volatility 10 (1s) Index</div>
    <div class="price-value" id="price">9780.34</div>
  </div>

  <!-- BUTTON -->
  <button class="btn">Stop Analysis</button>

  <!-- SCORE -->
  <div class="score">0</div>

  <!-- MATCH / DIFF -->
  <div class="card">
    <div class="stats">
      
      <div class="stat-box">
        <div>MATCH</div>
        <div class="circle">0</div>
        <div class="percent">0%</div>
      </div>

      <div class="stat-box">
        <div>DIFFERS</div>
        <div class="circle red">0</div>
        <div class="percent">0%</div>
      </div>

    </div>
  </div>

  <!-- CHART -->
  <div class="card">
    <div style="margin-bottom:10px">DIGIT FREQUENCY (100 TICKS)</div>
    <div class="chart" id="chart"></div>
  </div>

</div>

<script>
/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "0123456789";
letters = letters.split("");

let fontSize = 12;
let columns = canvas.width / fontSize;
let drops = [];

for (let i = 0; i < columns; i++) drops[i] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

/* SAMPLE CHART */
let chart = document.getElementById("chart");
for (let i = 0; i < 10; i++) {
  let bar = document.createElement("div");
  bar.className = "bar";
  bar.style.height = (Math.random() * 100 + 20) + "px";
  chart.appendChild(bar);
}
</script>

</body>
</html>
