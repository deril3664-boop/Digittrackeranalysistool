<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Digit Tracker Analysis Tool</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: orange;
  text-align: center;
}

/* MATRIX BACKGROUND */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* HEADER */
.header {
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

.live {
  color: lime;
  font-size: 14px;
}

/* MAIN CARD */
.container {
  width: 90%;
  max-width: 350px;
  margin: auto;
}

/* PRICE BOX */
.price-box {
  border: 1px solid orange;
  border-radius: 10px;
  padding: 12px;
  margin-top: 10px;
}

.price {
  font-size: 22px;
  margin-top: 5px;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 12px;
  width: 80%;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  background: orange;
  color: black;
}

/* SCORE CIRCLE */
.score-circle {
  margin: 25px auto;
  width: 120px;
  height: 120px;
  border: 4px solid orange;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
}

/* MATCH / DIFFERS */
.row {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.circle-box {
  width: 45%;
}

.small-circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 3px solid orange;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

.red {
  border-color: red;
}

.percent {
  margin-top: 5px;
}

/* CHART */
.chart {
  margin-top: 20px;
}

.bar {
  display: inline-block;
  width: 6%;
  margin: 1%;
  background: orange;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="header">
  Digit Tracker Analysis Tool
  <div class="live" id="status">Connecting...</div>
</div>

<div class="container">

  <h3>Matches / Differs</h3>

  <div class="price-box">
    <div>Volatility 10 (1s) Index</div>
    <div class="price" id="price">--</div>
  </div>

  <button onclick="toggleAnalysis()" id="btn">START ANALYSIS</button>

  <div class="score-circle" id="score">0</div>

  <div class="row">
    <div class="circle-box">
      <div>MATCH</div>
      <div class="small-circle" id="match">0</div>
      <div class="percent" id="matchP">0%</div>
    </div>

    <div class="circle-box">
      <div>DIFFERS</div>
      <div class="small-circle red" id="diff">0</div>
      <div class="percent" id="diffP">0%</div>
    </div>
  </div>

  <div class="chart" id="chart"></div>

</div>

<script>
let ws;
let analyzing = false;
let digits = [];

function connect() {
  ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=131595");

  ws.onopen = () => {
    document.getElementById("status").innerText = "LIVE";
    ws.send(JSON.stringify({ticks: "R_10", subscribe: 1}));
  };

  ws.onmessage = (msg) => {
    let data = JSON.parse(msg.data);
    if (data.tick) {
      let price = data.tick.quote;
      document.getElementById("price").innerText = price;

      let lastDigit = parseInt(price.toString().slice(-1));
      digits.push(lastDigit);
      if (digits.length > 45) digits.shift();

      if (analyzing) updateUI();
    }
  };

  ws.onclose = () => {
    document.getElementById("status").innerText = "Connection Failed";
    setTimeout(connect, 3000);
  };
}

connect();

function toggleAnalysis() {
  analyzing = !analyzing;
  document.getElementById("btn").innerText =
    analyzing ? "STOP ANALYSIS" : "START ANALYSIS";
}

function updateUI() {
  let freq = Array(10).fill(0);

  digits.forEach(d => freq[d]++);

  let match = freq[digits[digits.length-1]];
  let diff = digits.length - match;

  document.getElementById("match").innerText = match;
  document.getElementById("diff").innerText = diff;

  document.getElementById("matchP").innerText =
    Math.round((match / digits.length) * 100) + "%";

  document.getElementById("diffP").innerText =
    Math.round((diff / digits.length) * 100) + "%";

  document.getElementById("score").innerText =
    Math.round((match / digits.length) * 10);

  drawChart(freq);
}

function drawChart(freq) {
  let chart = document.getElementById("chart");
  chart.innerHTML = "";

  freq.forEach(v => {
    let bar = document.createElement("div");
    bar.className = "bar";
    bar.style.height = (v * 5) + "px";
    chart.appendChild(bar);
  });
}

/* MATRIX EFFECT */
let c = document.getElementById("matrix");
let ctx = c.getContext("2d");

c.height = window.innerHeight;
c.width = window.innerWidth;

let letters = "0123456789";
letters = letters.split("");

let fontSize = 10;
let columns = c.width / fontSize;

let drops = [];
for (let i = 0; i < columns; i++) drops[i] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, c.width, c.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > c.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);
</script>

</body>
</html>
