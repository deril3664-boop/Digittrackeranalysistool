<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AimagicsPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            min-height: 100dvh;
        }

        /* Full Screen Phone Logic */
        .app-shell {
            width: 100%;
            max-width: 500px;
            min-height: 100dvh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (max-width: 640px) {
            .app-shell { max-width: 100%; border-radius: 0; }
        }

        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); }
        }
        .prediction-pulse { animation: pulse-ring 1.5s infinite; }
    </style>
</head>
<body>

    <div class="app-shell">
        <header class="bg-gradient-to-r from-gray-900 via-gray-800 to-gray-900 text-white px-4 py-4 flex items-center justify-between shadow-md">
            <h1 class="text-lg font-semibold tracking-wide">AimagicsPro</h1>
            <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400 font-medium">CapCut</span>
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
                </svg>
            </div>
        </header>

        <div class="mx-4 mt-4 mb-6">
            <div class="bg-cyan-50 border border-cyan-200 rounded-lg py-2.5 px-4 text-center">
                <p class="text-cyan-700 text-sm font-semibold tracking-wide uppercase">
                    Welcome Amos to Binary Option
                </p>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto px-4 pb-10">
            <div id="screen-indices" class="">
                <label class="block text-gray-900 text-xl font-bold mb-3">Binary Indices</label>
                <div class="relative">
                    <button onclick="toggleDropdown('indices')" class="w-full bg-gray-100 border-2 border-gray-300 rounded-xl py-3.5 px-4 text-left flex items-center justify-between">
                        <span id="selected-index" class="text-gray-800 font-medium">Volatility 10 Index</span>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-gray-500"></i>
                    </button>
                    <div id="indices-dropdown" class="hidden absolute left-0 right-0 mt-1 bg-white rounded-xl shadow-xl z-50 border border-gray-200 overflow-hidden">
                        <div class="max-h-[300px] overflow-y-auto" id="indices-list"></div>
                    </div>
                </div>
                <button onclick="goToTradeType()" class="w-full mt-8 py-4 rounded-xl font-bold bg-blue-500 text-white shadow-lg active:scale-95 transition-all">Next</button>
            </div>

            <div id="screen-tradeType" class="hidden">
                <label class="block text-gray-900 text-xl font-bold mb-3">Trade Type</label>
                <div class="relative">
                    <button onclick="toggleDropdown('tradeType')" class="w-full bg-gray-100 border-2 border-gray-300 rounded-xl py-3.5 px-4 text-left flex items-center justify-between">
                        <span id="selected-trade" class="text-gray-800 font-medium">Over</span>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-gray-500"></i>
                    </button>
                    <div id="tradeType-dropdown" class="hidden absolute left-0 right-0 mt-1 bg-white rounded-xl shadow-xl z-50 border border-gray-200">
                        <div id="tradeType-list"></div>
                    </div>
                </div>
                <div class="space-y-3 mt-8">
                    <button onclick="goToAnalysis()" class="w-full py-4 rounded-xl font-bold bg-blue-500 text-white shadow-lg active:scale-95 transition-all">Start Terminal</button>
                    <button onclick="goToIndices()" class="w-full py-4 rounded-xl font-bold bg-gray-400 text-white active:scale-95 transition-all">Back</button>
                </div>
            </div>

            <div id="screen-analysis" class="hidden space-y-6">
                <div class="grid grid-cols-5 gap-2" id="digit-grid-top"></div>
                <div class="grid grid-cols-5 gap-2" id="digit-grid-bottom"></div>

                <div id="prediction-container" class="hidden mt-8 flex flex-col items-center">
                    <div class="w-28 h-28 rounded-full border-4 border-blue-500 flex items-center justify-center bg-white prediction-pulse shadow-xl">
                        <span id="final-recommendation" class="font-black text-blue-700 leading-none">-</span>
                    </div>
                    <p id="confidence-text" class="text-[10px] text-blue-500 mt-4 font-bold uppercase tracking-widest"></p>
                </div>

                <div class="space-y-3 pt-4">
                    <button onclick="calculateDominantSignal()" id="run-btn" class="w-full py-4 rounded-xl font-bold bg-blue-500 text-white shadow-lg active:scale-95 transition-all">RUN ANALYSIS</button>
                    <button onclick="goToTradeType()" class="w-full py-4 rounded-xl font-bold bg-gray-400 text-white active:scale-95 transition-all">Back</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // --- SILENT WEBSOCKET (131595) ---
        const A_I = '131595';
        let ws, tickHistory = [];
        const indexMap = {
            'Volatility 10 Index': 'R_10', 'Volatility 10 (1s) Index': '1HZ10V',
            'Volatility 25 Index': 'R_25', 'Volatility 25 (1s) Index': '1HZ25V',
            'Volatility 50 Index': 'R_50', 'Volatility 50 (1s) Index': '1HZ50V',
            'Volatility 75 Index': 'R_75', 'Volatility 75 (1s) Index': '1HZ75V',
            'Volatility 100 Index': 'R_100', 'Volatility 100 (1s) Index': '1HZ100V'
        };

        function connectWS() {
            ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${A_I}`);
            ws.onopen = () => subscribeTicks();
            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);
                if (data.tick) {
                    const d = parseInt(data.tick.quote.toString().slice(-1));
                    tickHistory.push(d);
                    if (tickHistory.length > 100) tickHistory.shift();
                    updateLiveGrid();
                }
            };
            ws.onclose = () => setTimeout(connectWS, 3000);
        }

        function subscribeTicks() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const symbol = indexMap[selectedIndex] || 'R_10';
                ws.send(JSON.stringify({ forget_all: "ticks" }));
