<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimagicsPro - Binary Options</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: 'Inter', sans-serif; background: #000; }

/* (ALL YOUR ORIGINAL CSS — UNCHANGED) */
.ws-connected { background-color: #d1fae5; border-color: #10b981; }
.ws-connecting { background-color: #fef3c7; border-color: #f59e0b; }
.ws-disconnected { background-color: #fee2e2; border-color: #ef4444; }

.ws-dot { width:8px;height:8px;border-radius:50%; }
.ws-dot.connected { background:#10b981; }
.ws-dot.connecting { background:#f59e0b; animation:pulse 1s infinite; }
.ws-dot.disconnected { background:#ef4444; }

@keyframes pulse {0%,100%{opacity:1}50%{opacity:.5}}

.strategy-card.selected { border-color:#3b82f6;background:#eff6ff; }
</style>
</head>

<body class="bg-black flex justify-center p-4">

<div class="w-full max-w-sm bg-gray-50 rounded-3xl overflow-hidden shadow-2xl">

<!-- HEADER -->
<div class="bg-gray-900 text-white p-3 flex justify-between">
<h1>AimagicsPro</h1>
</div>

<!-- WS STATUS -->
<div class="mx-4 mt-3">
<div id="ws-status-container" class="ws-disconnected border-2 rounded-xl p-2 flex justify-between">
<div class="flex gap-2">
<div id="ws-dot" class="ws-dot disconnected"></div>
<span id="ws-status-text">Disconnected</span>
</div>
<button onclick="toggleConnection()">Connect</button>
</div>
</div>

<!-- NAV -->
<div id="screen-indices" class="p-4">
<button onclick="goToStrategies()" class="bg-blue-500 text-white w-full p-3 rounded">Next</button>
</div>

<div id="screen-strategies" class="hidden p-4">
<div onclick="selectStrategy('matches')" id="strategy-matches" class="strategy-card p-3 bg-white mb-2">Matches</div>
<div onclick="selectStrategy('evenodd')" id="strategy-evenodd" class="strategy-card p-3 bg-white mb-2">Even/Odd</div>
<div onclick="selectStrategy('overunder')" id="strategy-overunder" class="strategy-card p-3 bg-white mb-2">Over/Under</div>
<div onclick="selectStrategy('risefall')" id="strategy-risefall" class="strategy-card p-3 bg-white mb-2">Rise/Fall</div>

<button onclick="goToAnalysis()" class="bg-blue-500 text-white w-full p-3 rounded">Start</button>
</div>

<div id="screen-analysis" class="hidden p-4">

<h2>Live Price</h2>
<div id="live-price">0.0000</div>
<div id="live-digit">-</div>

<div class="mt-3">
<div id="tick-counter">0/45</div>
<div id="buffer-status">Buffer: 0/45</div>
<div class="bg-gray-300 h-2 rounded">
<div id="tick-progress" class="bg-green-500 h-2" style="width:0%"></div>
</div>
</div>

<div class="mt-4 p-3 bg-blue-600 text-white rounded hidden" id="stable-signal">
<div id="signal-type"></div>
<div id="signal-value" class="text-2xl"></div>
<div id="signal-confidence"></div>
<div id="stat-winrate"></div>
<div id="stat-ticks"></div>
<div id="stat-trend"></div>
<div id="signal-timestamp"></div>
</div>

</div>

</div>

<!-- ============================= -->
<!-- FULL ENGINE SCRIPT -->
<!-- ============================= -->
<script>

/* GLOBAL STATE */
let ws=null;
let tickBuffer=[];
let MAX_TICKS=45;
let selectedStrategy="matches";

/* UI STATUS */
function updateWSStatus(state){
const c=document.getElementById("ws-status-container");
const dot=document.getElementById("ws-dot");
const txt=document.getElementById("ws-status-text");

c.className="border-2 rounded-xl p-2 flex justify-between ws-"+state;
dot.className="ws-dot "+state;
txt.innerText=state;
}

/* WS CONNECTION */
function connectWebSocket(){
updateWSStatus("connecting");

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
updateWSStatus("connected");

ws.send(JSON.stringify({
ticks:"R_10",
subscribe:1
}));
};

ws.onmessage=(msg)=>{
let data=JSON.parse(msg.data);
if(data.tick){
handleTick(data.tick);
}
};

ws.onclose=()=>{
updateWSStatus("disconnected");
setTimeout(connectWebSocket,3000);
};

ws.onerror=()=>ws.close();
}

function toggleConnection(){
if(!ws||ws.readyState!==1){
connectWebSocket();
}else{
ws.close();
}
}

/* HANDLE TICKS */
function handleTick(tick){
let price=tick.quote;
let digit=parseInt(price.toString().slice(-1));

document.getElementById("live-price").innerText=price.toFixed(4);
document.getElementById("live-digit").innerText=digit;

tickBuffer.push(digit);
if(tickBuffer.length>MAX_TICKS)tickBuffer.shift();

updateBuffer();

if(tickBuffer.length===MAX_TICKS){
analyze();
}
}

/* BUFFER UI */
function updateBuffer(){
let c=tickBuffer.length;

document.getElementById("tick-counter").innerText=c+"/45";
document.getElementById("buffer-status").innerText="Buffer: "+c+"/45";

let percent=(c/MAX_TICKS)*100;
document.getElementById("tick-progress").style.width=percent+"%";
}

/* ANALYSIS */
function analyze(){
let freq=Array(10).fill(0);
tickBuffer.forEach(d=>freq[d]++);

let most=freq.indexOf(Math.max(...freq));
let even=tickBuffer.filter(d=>d%2===0).length;
let odd=45-even;

let rise=0,fall=0;
for(let i=1;i<45;i++){
if(tickBuffer[i]>tickBuffer[i-1])rise++;
else if(tickBuffer[i]<tickBuffer[i-1])fall++;
}

generate({most,freq,even,odd,rise,fall});
}

/* SIGNAL */
function generate(d){
let value="-";
let confidence=0;
let trend=d.rise>d.fall?"UP":"DOWN";

if(selectedStrategy==="matches"){
value=d.most;
confidence=(d.freq[d.most]/45)*100;
}

if(selectedStrategy==="evenodd"){
value=d.even>d.odd?"EVEN":"ODD";
confidence=Math.max(d.even,d.odd)/45*100;
}

if(selectedStrategy==="overunder"){
value=d.most>4?"OVER":"UNDER";
confidence=(d.freq[d.most]/45)*100;
}

if(selectedStrategy==="risefall"){
value=d.rise>d.fall?"RISE":"FALL";
confidence=Math.max(d.rise,d.fall)/45*100;
}

updateSignal(value,confidence,trend);
}

/* SIGNAL UI */
function updateSignal(v,c,t){
document.getElementById("signal-value").innerText=v;
document.getElementById("signal-confidence").innerText=c.toFixed(1)+"%";
document.getElementById("stat-winrate").innerText=c.toFixed(0)+"%";
document.getElementById("stat-ticks").innerText=tickBuffer.length;
document.getElementById("stat-trend").innerText=t;
document.getElementById("signal-type").innerText=selectedStrategy;
document.getElementById("signal-timestamp").innerText=new Date().toLocaleTimeString();

document.getElementById("stable-signal").classList.remove("hidden");
}

/* NAV */
function goToStrategies(){
document.getElementById("screen-indices").classList.add("hidden");
document.getElementById("screen-strategies").classList.remove("hidden");
}

function goToAnalysis(){
document.getElementById("screen-strategies").classList.add("hidden");
document.getElementById("screen-analysis").classList.remove("hidden");
connectWebSocket();
}

/* STRATEGY */
function selectStrategy(type){
selectedStrategy=type;
document.querySelectorAll(".strategy-card").forEach(e=>e.classList.remove("selected"));
document.getElementById("strategy-"+type).classList.add("selected");
}

</script>

</body>
</html>
